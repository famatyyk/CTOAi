services:
  bot:
    image: ctoa-bot:latest
    build:
      context: ../..
      dockerfile: bot/infra/Dockerfile
    env_file: ../../.env
    volumes:
      - bot_data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    image: ctoa-bot:latest
    command: uvicorn bot.dashboard.app:app --host 0.0.0.0 --port 8000
    env_file: ../../.env
    volumes:
      - bot_data:/app/data
    ports:
      - "${CTOA_BOT_DASHBOARD_BIND_HOST:-127.0.0.1}:8000:8000"
    depends_on: [bot]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${CTOA_MONITOR_BIND_HOST:-127.0.0.1}:9090:9090"
    depends_on: [dashboard]

volumes:
  bot_data:
