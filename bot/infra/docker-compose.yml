version: "3.9"

services:
  bot:
    build:
      context: ../..
      dockerfile: bot/infra/Dockerfile
    command: sh -c "rm -f /tmp/.X99-lock /tmp/.X11-unix/X99; Xvfb :99 -screen 0 1280x720x24 >/tmp/xvfb.log 2>&1 & sleep 1; exec python -m bot.main"
    env_file: ../../.env
    volumes:
      - bot_data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: ../..
      dockerfile: bot/infra/Dockerfile
    command: uvicorn bot.dashboard.app:app --host 0.0.0.0 --port 8000
    env_file: ../../.env
    volumes:
      - bot_data:/app/data
    ports:
      - "8000:8000"
    depends_on: [bot]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on: [dashboard]

volumes:
  bot_data:
