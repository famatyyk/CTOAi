# CTOA AI Toolkit — Azure AI Foundry Agent Metadata
# Fill in projectEndpoint and azureContainerRegistry after provisioning resources.
# Run: az ai foundry project show --name <project> --resource-group <rg>

defaultEnvironment: dev

environments:
  dev:
    projectEndpoint: https://<YOUR_FOUNDRY_PROJECT>.services.ai.azure.com/api/projects/<PROJECT_NAME>
    agentName: ctoa-orchestrator-dev
    azureContainerRegistry: <YOUR_ACR>.azurecr.io
    observability:
      applicationInsightsResourceId: /subscriptions/<SUB_ID>/resourceGroups/<RG>/providers/Microsoft.Insights/components/<AI_COMPONENT>
    testCases:
      - id: smoke-pipeline
        priority: P0
        dataset: ctoa-smoke-v1
        datasetFile: .foundry/datasets/ctoa-smoke-v1.jsonl
        evaluators:
          - name: task_adherence
            threshold: 4
          - name: coherence
            threshold: 4

  prod:
    projectEndpoint: https://<YOUR_FOUNDRY_PROJECT>.services.ai.azure.com/api/projects/<PROJECT_NAME>-prod
    agentName: ctoa-orchestrator-prod
    azureContainerRegistry: <YOUR_ACR>.azurecr.io
    testCases:
      - id: production-guardrails
        priority: P0
        dataset: ctoa-prod-guardrails-v1
        datasetFile: .foundry/datasets/ctoa-prod-guardrails-v1.jsonl
        evaluators:
          - name: violence
            threshold: 1
          - name: self_harm
            threshold: 1
