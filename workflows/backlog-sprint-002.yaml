version: 1
backlog_id: sprint-002
window_days: 14
focus: "Stability + Observability + Sprint cadence"
owner: queen-ctoa

rules:
  max_parallel_tasks: 3
  definition_of_done:
    - code_or_config_created
    - tests_defined_and_passed
    - qa_report_present
    - ci_gate_passed
  release_policy:
    - approval_required: true
    - environment: production

tasks:
  - id: CTOA-011
    title: "Disk emergency runbook"
    priority: P0
    type: docs
    domain: [ops, reliability]
    assignees: [pm-roadmap, qa-safety]
    estimate_hours: 3
    deliverables:
      - "docs/runbook-disk-emergency.md"
    acceptance:
      - "Includes triage, safe cleanup, and escalation steps"
      - "Validated against current VPS setup"

  - id: CTOA-012
    title: "Validation checklist refresh"
    priority: P0
    type: docs
    domain: [ops, governance]
    assignees: [qa-safety, pm-roadmap]
    estimate_hours: 3
    deliverables:
      - "docs/VALIDATION_CHECKLIST.md"
    acceptance:
      - "Covers retention timer, health live service, and sprint transitions"
      - "Includes pass/fail criteria"

  - id: CTOA-013
    title: "Runner state rollover guard"
    priority: P0
    type: code
    domain: [automation, reliability]
    assignees: [builder-engine, qa-safety]
    estimate_hours: 4
    deliverables:
      - "runner/runner.py"
      - "tests/test_runner_state_rollover.py"
    acceptance:
      - "Backlog switch re-initializes state safely"
      - "Regression test covers backlog_id mismatch"

  - id: CTOA-014
    title: "Health trend KPI formatter"
    priority: P1
    type: code
    domain: [observability]
    assignees: [mmo-intel, builder-engine]
    estimate_hours: 5
    deliverables:
      - "runner/health_trend.py"
      - "docs/kpi-format.md"
    acceptance:
      - "Outputs weekly KPI section (disk/cpu/memory/alerts)"
      - "Non-zero exit on missing history file"

  - id: CTOA-015
    title: "Retention cleanup telemetry"
    priority: P1
    type: code
    domain: [ops, observability]
    assignees: [builder-engine, qa-safety]
    estimate_hours: 5
    deliverables:
      - "deploy/vps/cleanup-retention.sh"
      - "runner/health_metrics.py"
    acceptance:
      - "Writes cleanup execution marker to health history"
      - "Cooldown behavior visible in logs"

  - id: CTOA-016
    title: "Approval lead-time metric"
    priority: P1
    type: code
    domain: [analytics, governance]
    assignees: [mmo-intel, pm-roadmap]
    estimate_hours: 6
    deliverables:
      - "runner/runner.py"
      - "runner/weekly_report.py"
    acceptance:
      - "Report includes avg and p95 approval lead-time"
      - "Handles empty samples gracefully"

  - id: CTOA-017
    title: "Service drift detector"
    priority: P1
    type: code
    domain: [ops, reliability]
    assignees: [bot-architect, qa-safety]
    estimate_hours: 6
    deliverables:
      - "scripts/ops/ctoa-vps.ps1"
      - "docs/ARCHITECTURE.md"
    acceptance:
      - "Detects disabled timers/services and reports diff"
      - "No false positive when service is active"

  - id: CTOA-018
    title: "Issue #1 status compact mode"
    priority: P2
    type: code
    domain: [reporting]
    assignees: [prompt-forge, pm-roadmap]
    estimate_hours: 4
    deliverables:
      - "runner/runner.py"
    acceptance:
      - "Adds compact output toggle for live status"
      - "Maintains current default format"

  - id: CTOA-019
    title: "Nightly reliability snapshot"
    priority: P2
    type: code
    domain: [ops, observability]
    assignees: [mmo-intel, tool-advisor]
    estimate_hours: 5
    deliverables:
      - "runner/daily_insights.py"
      - "docs/LOCAL_SETUP.md"
    acceptance:
      - "Generates nightly snapshot with service states and top alerts"
      - "Stored artifact path documented"

  - id: CTOA-020
    title: "Sprint closure checklist automation"
    priority: P2
    type: code
    domain: [governance, automation]
    assignees: [pm-roadmap, tool-advisor]
    estimate_hours: 5
    deliverables:
      - "runner/close_on_gate.py"
      - "docs/VALIDATION_CHECKLIST.md"
    acceptance:
      - "Verifies release count and pending approvals"
      - "Outputs ready/not-ready closure verdict"

release_target:
  app_cycle_day: 14
  app_candidate: "CTOA Mission Control Sprint-005"
  app_scope:
    - "Backlog refresh"
    - "Reliability validation"
    - "KPI reporting"
