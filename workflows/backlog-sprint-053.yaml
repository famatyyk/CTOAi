version: 1
backlog_id: sprint-053
window_days: 3
focus: "State sync dry-run hardening + release gate assertions + Sprint-053 wave execution"
owner: strategos

rules:
  max_parallel_tasks: 3
  definition_of_done:
    - implementation_created
    - validation_passed
    - evidence_recorded
    - documentation_updated
  release_policy:
    - approval_required: true
    - environment: production

tasks:
  - id: CTOA-276
    title: "Open Sprint-053 kickoff baseline and scope lock"
    priority: P0
    type: governance
    domain: [governance, planning, release]
    assignees: [strategos, core-architect, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "workflows/backlog-sprint-053.yaml"
      - "workflows/sprint-053-delivery-flow.yaml"
      - "docs/history/sprints/SPRINT-053.md"
    acceptance:
      - "Sprint-053 backlog and flow are published"
      - "Scope and gate expectations are explicit"
      - "Kickoff decision checkpoint is documented"

  - id: CTOA-277
    title: "Wire Sprint-053 validator and local Wave-1 chain"
    priority: P0
    type: quality
    domain: [ci, qa, automation]
    assignees: [qa-terminator, core-architect]
    estimate_hours: 3
    deliverables:
      - "scripts/ops/sprint053_validate.py"
      - ".vscode/tasks.json"
      - "runtime/ci-artifacts/sprint-053-validation.json"
    acceptance:
      - "Validator checks Sprint-053 files, hooks, pipeline, and task wiring"
      - "Wave-1 chain executes tests plus validate plus launch gate"
      - "Validation artifact path is wired in CI"

  - id: CTOA-278
    title: "Add dry-run mode to sprint state synchronization"
    priority: P1
    type: governance
    domain: [governance, ops, observability]
    assignees: [strategos, devops-master]
    estimate_hours: 2
    deliverables:
      - "scripts/ops/sprint_state_sync.py"
      - "releases/evidence/sprint-053/CTOA-278.md"
    acceptance:
      - "State sync script supports dry-run preview without writes"
      - "Dry-run output reports release counts and target backlog"
      - "Operator can choose preview before applying sync"

  - id: CTOA-279
    title: "Enforce RELEASED doc assertion in CI quality gate"
    priority: P1
    type: quality
    domain: [ci, qa, governance]
    assignees: [qa-terminator, core-architect]
    estimate_hours: 2
    deliverables:
      - "scripts/ops/sprint053_validate.py"
      - "releases/evidence/sprint-053/CTOA-279.md"
    acceptance:
      - "Validator gate asserts RELEASED docs require aligned runtime state"
      - "Mismatch gate remains critical with actionable hints"
      - "CI passes only when assertion conditions are satisfied"

  - id: CTOA-280
    title: "Execute Sprint-053 Wave-1 and collect evidence"
    priority: P1
    type: governance
    domain: [governance, qa, release]
    assignees: [strategos, qa-terminator, documentation-sage]
    estimate_hours: 3
    deliverables:
      - "runtime/ci-artifacts/sprint-053-wave1-run.log"
      - "releases/evidence/sprint-053/CTOA-280.md"
      - "docs/history/sprints/SPRINT-053-PROGRESS.md"
    acceptance:
      - "Wave-1 chain completes with green gates"
      - "Evidence links are complete"
      - "Residual risk notes are explicit"

  - id: CTOA-281
    title: "Publish Sprint-053 sign-off and Sprint-054 handoff"
    priority: P1
    type: governance
    domain: [governance, release, planning]
    assignees: [strategos, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "docs/history/sprints/SPRINT-053.md"
      - "releases/evidence/sprint-053/CTOA-281.md"
    acceptance:
      - "Sign-off includes delivered scope and unresolved items"
      - "Sprint-054 handoff recommendations are documented"
      - "God Mode checkpoint is explicit"
