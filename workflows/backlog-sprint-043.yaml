version: 1
backlog_id: sprint-043
window_days: 3
focus: "Post-release monitoring continuity + least-privilege observability + governance-ready closure"
owner: strategos

rules:
  max_parallel_tasks: 3
  definition_of_done:
    - implementation_created
    - validation_passed
    - evidence_recorded
    - documentation_updated
  release_policy:
    - approval_required: true
    - environment: production

tasks:
  - id: CTOA-215
    title: "Run and document post-release 24h monitoring for health/report/runner"
    priority: P0
    type: reliability
    domain: [ops, observability, reliability]
    assignees: [devops-master, qa-terminator]
    estimate_hours: 3
    deliverables:
      - "runtime/ci-artifacts/sprint-042-post-release-monitoring-window.log"
      - "runtime/ci-artifacts/sprint-042-post-release-monitoring-24h.json"
      - "runtime/experiments/sprint-042/POST-RELEASE-24H.md"
    acceptance:
      - "24h monitoring window is opened with UTC start and target end timestamps"
      - "Baseline checks PASS for health-live, runner timer, and report timer"
      - "Short summary note is published with evidence links"

  - id: CTOA-216
    title: "Align observability actions with least-privilege sudo policy"
    priority: P0
    type: security
    domain: [security, ops, hardening]
    assignees: [security-guardian, devops-master]
    estimate_hours: 4
    deliverables:
      - "scripts/ops/ctoa-vps.ps1"
      - "deploy/vps/wrappers/ctoa-root-action.sh"
      - "docs/runbook-vps-mobile-console.md"
    acceptance:
      - "Operational observability actions do not require ad-hoc sudo password prompts"
      - "Wrapper map includes explicit paths for system health and dashboard snapshot"
      - "Health and dashboard checks succeed through approved least-privilege routes"

  - id: CTOA-217
    title: "Kick off Sprint-043 control-plane backlog and rollout checklist"
    priority: P1
    type: governance
    domain: [governance, release]
    assignees: [strategos, core-architect]
    estimate_hours: 2
    deliverables:
      - "workflows/backlog-sprint-043.yaml"
      - "workflows/sprint-043-delivery-flow.yaml"
      - "docs/history/sprints/SPRINT-043.md"
    acceptance:
      - "Backlog and delivery flow published with CTOA-215..220 scope"
      - "Sprint-043 Definition of Done is documented"
      - "Kickoff checklist references baseline and rollback policy"

  - id: CTOA-218
    title: "Create Sprint-043 validator and wave task wiring"
    priority: P1
    type: quality
    domain: [ci, qa, automation]
    assignees: [qa-terminator, core-architect]
    estimate_hours: 4
    deliverables:
      - "scripts/ops/sprint043_validate.py"
      - ".vscode/tasks.json"
      - "runtime/ci-artifacts/sprint-043-validation.json"
    acceptance:
      - "Validator verifies backlog, flow, and sprint artifacts for Sprint-043"
      - "Wave-1 task chain executes tests and validator without errors"
      - "Validation artifact is produced under runtime/ci-artifacts"

  - id: CTOA-219
    title: "Sprint-043 Wave-1 evidence run"
    priority: P1
    type: governance
    domain: [qa, governance, release]
    assignees: [qa-terminator, strategos]
    estimate_hours: 3
    deliverables:
      - "runtime/ci-artifacts/sprint-043-wave1-run.log"
      - "runtime/ci-artifacts/sprint-043-validation.json"
    acceptance:
      - "Focused tests PASS"
      - "Sprint-043 validator reports PASS"
      - "Wave-1 evidence links are complete"

  - id: CTOA-220
    title: "Sprint-043 Wave-2 sign-off and release memo"
    priority: P1
    type: governance
    domain: [governance, release]
    assignees: [strategos, core-architect, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "docs/history/sprints/SPRINT-043.md"
      - "runtime/experiments/sprint-043/CTOA-220.md"
    acceptance:
      - "All Sprint-043 tasks are in WAITING_APPROVAL or RELEASED"
      - "Residual risks and rollback baseline are recorded"
      - "Manual sign-off includes owner accountability"

