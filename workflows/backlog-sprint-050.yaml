version: 1
backlog_id: sprint-050
window_days: 3
focus: "Approval observability hardening + evidence promotion + Sprint-050 wave execution"
owner: strategos

rules:
  max_parallel_tasks: 3
  definition_of_done:
    - implementation_created
    - validation_passed
    - evidence_recorded
    - documentation_updated
  release_policy:
    - approval_required: true
    - environment: production

tasks:
  - id: CTOA-258
    title: "Open Sprint-050 kickoff baseline and scope lock"
    priority: P0
    type: governance
    domain: [governance, planning, release]
    assignees: [strategos, core-architect, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "workflows/backlog-sprint-050.yaml"
      - "workflows/sprint-050-delivery-flow.yaml"
      - "docs/history/sprints/SPRINT-050.md"
    acceptance:
      - "Sprint-050 backlog and flow are published"
      - "Scope and gate expectations are explicit"
      - "Kickoff decision checkpoint is documented"

  - id: CTOA-259
    title: "Wire Sprint-050 validator and local Wave-1 chain"
    priority: P0
    type: quality
    domain: [ci, qa, automation]
    assignees: [qa-terminator, core-architect]
    estimate_hours: 3
    deliverables:
      - "scripts/ops/sprint050_validate.py"
      - ".vscode/tasks.json"
      - "runtime/ci-artifacts/sprint-050-validation.json"
    acceptance:
      - "Validator checks Sprint-050 files, hooks, pipeline, and task wiring"
      - "Wave-1 chain executes tests plus validate plus launch gate"
      - "Validation artifact path is wired in CI"

  - id: CTOA-260
    title: "Harden approval queue observability and operator guidance"
    priority: P1
    type: governance
    domain: [governance, ops, observability]
    assignees: [strategos, devops-master]
    estimate_hours: 2
    deliverables:
      - "docs/VALIDATION_CHECKLIST.md"
      - "runtime/experiments/sprint-050/CTOA-260.md"
    acceptance:
      - "Approval queue status is explicit in operational checks"
      - "Operator path from waiting approval to released is documented"
      - "No ambiguity remains in approval closure sequence"

  - id: CTOA-261
    title: "Promote release-significant runtime evidence to tracked locations"
    priority: P1
    type: governance
    domain: [governance, release, hygiene]
    assignees: [documentation-sage, core-architect]
    estimate_hours: 2
    deliverables:
      - "docs/REPO_HYGIENE_POLICY.md"
      - "releases/evidence/"
      - "runtime/experiments/sprint-050/CTOA-261.md"
    acceptance:
      - "Rule set identifies which runtime artifacts must be promoted"
      - "Tracked evidence path is used for sign-off-ready artifacts"
      - "Policy examples are documented"

  - id: CTOA-262
    title: "Execute Sprint-050 Wave-1 and collect evidence"
    priority: P1
    type: governance
    domain: [governance, qa, release]
    assignees: [strategos, qa-terminator, documentation-sage]
    estimate_hours: 3
    deliverables:
      - "runtime/ci-artifacts/sprint-050-wave1-run.log"
      - "runtime/experiments/sprint-050/CTOA-262.md"
      - "docs/history/sprints/SPRINT-050-PROGRESS.md"
    acceptance:
      - "Wave-1 chain completes with green gates"
      - "Evidence links are complete"
      - "Residual risk notes are explicit"

  - id: CTOA-263
    title: "Publish Sprint-050 sign-off and Sprint-051 handoff"
    priority: P1
    type: governance
    domain: [governance, release, planning]
    assignees: [strategos, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "docs/history/sprints/SPRINT-050.md"
      - "runtime/experiments/sprint-050/CTOA-263.md"
    acceptance:
      - "Sign-off includes delivered scope and unresolved items"
      - "Sprint-051 handoff recommendations are documented"
      - "God Mode checkpoint is explicit"
