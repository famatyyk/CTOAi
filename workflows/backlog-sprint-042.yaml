  title: Operator adoption workflow (get-started guide)
  type: documentation
  priority: P1
  status: READY_FOR_WAVE_1
  description: >
    Create a step-by-step operator onboarding guide for CTOA v1.14.0 adoption.
    Include: installation, configuration, first test run, troubleshooting quick-start.
    Deliverable: docs/OPERATOR_GET_STARTED.md

- id: CTOA-209
  title: Infrastructure hardening audit (Phase-5 evolution)
  type: operations
  priority: P1
  status: READY_FOR_WAVE_1
