sprint: '049'
theme: Mainline CI stabilization + approval workflow closure + Sprint-049 wave execution
version: '1.0'
lifecycle:
  start: '2026-05-22'
  target_wave1: '2026-05-23'
  target_wave2: '2026-05-24'

tasks:
  - id: CTOA-251
    title: Sprint-049 kickoff baseline
    on_start: publish Sprint-049 backlog, flow, and kickoff baseline
    on_complete: confirm Sprint-049 scope lock and decision checkpoints
    on_fail: block sprint start and publish blockers

  - id: CTOA-252
    title: Sprint-049 validator and Wave-1 wiring
    depends_on:
      - CTOA-251
    on_start: scaffold sprint049 validator and local task chain
    on_complete: validator and Wave-1 tasks are runnable with artifacts
    on_fail: revert task wiring to last stable baseline

  - id: CTOA-253
    title: Legacy validator compatibility hardening
    depends_on:
      - CTOA-252
    on_start: patch legacy sprint validators for non-mapping flow artifacts
    on_complete: Build Test Gate regression is mitigated and documented
    on_fail: isolate failing validators and keep mitigation backlog open

  - id: CTOA-254
    title: Approval Publish operationalization
    depends_on:
      - CTOA-253
    on_start: validate and document deterministic approval completion path
    on_complete: Approval Publish closure path is evidenced
    on_fail: escalate approval workflow blocker with run-level diagnostics

  - id: CTOA-255
    title: Sprint-049 Wave-1 execution
    depends_on:
      - CTOA-252
      - CTOA-253
      - CTOA-254
    on_start: execute refresh, tests, sprint049 validate, and launch gate
    on_complete: publish Wave-1 evidence and residual risk summary
    on_fail: hold sprint in IN_CI_GATE and document blocker details

  - id: CTOA-256
    title: Sign-off and Sprint-050 handoff
    depends_on:
      - CTOA-255
    on_start: compile closure memo and Sprint-050 recommendations
    on_complete: publish sign-off and God Mode checkpoint
    on_fail: keep sprint open with unresolved closure items

gate_policy:
  wave_1: sprint049 validator PASS + launch gate PASS + core guard PASS
  wave_2: manual STRATEGOS sign-off with blocker closure note
  rollback_baseline: v1.15.0
