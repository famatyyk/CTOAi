version: 1
backlog_id: sprint-054
window_days: 3
focus: "UTF-8 wave summary artifact + RELEASED assertion continuity + evidence promotion discipline"
owner: strategos

rules:
  max_parallel_tasks: 3
  definition_of_done:
    - implementation_created
    - validation_passed
    - evidence_recorded
    - documentation_updated
  release_policy:
    - approval_required: true
    - environment: production

tasks:
  - id: CTOA-282
    title: "Open Sprint-054 kickoff baseline and scope lock"
    priority: P0
    type: governance
    domain: [governance, planning, release]
    assignees: [strategos, core-architect, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "workflows/backlog-sprint-054.yaml"
      - "workflows/sprint-054-delivery-flow.yaml"
      - "docs/history/sprints/SPRINT-054.md"
    acceptance:
      - "Sprint-054 backlog and flow are published"
      - "Scope and gate expectations are explicit"
      - "Kickoff decision checkpoint is documented"

  - id: CTOA-283
    title: "Wire Sprint-054 validator and local Wave-1 chain"
    priority: P0
    type: quality
    domain: [ci, qa, automation]
    assignees: [qa-terminator, core-architect]
    estimate_hours: 3
    deliverables:
      - "scripts/ops/sprint054_validate.py"
      - ".vscode/tasks.json"
      - "runtime/ci-artifacts/sprint-054-validation.json"
    acceptance:
      - "Validator checks Sprint-054 files, hooks, pipeline, and task wiring"
      - "Wave-1 chain executes tests plus validate plus launch gate"
      - "Validation artifact path is wired in CI"

  - id: CTOA-284
    title: "Add compact UTF-8 Wave summary artifact"
    priority: P1
    type: governance
    domain: [governance, ops, observability]
    assignees: [strategos, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "runtime/ci-artifacts/sprint-054-wave1-summary.txt"
      - "releases/evidence/sprint-054/CTOA-284.md"
    acceptance:
      - "Wave summary is UTF-8 plain text and operator-readable"
      - "Summary captures key gate outcomes in compact format"
      - "Summary path is referenced in sprint evidence"

  - id: CTOA-285
    title: "Enforce RELEASED assertion continuity in sprint gate"
    priority: P1
    type: quality
    domain: [ci, qa, governance]
    assignees: [qa-terminator, core-architect]
    estimate_hours: 2
    deliverables:
      - "scripts/ops/sprint054_validate.py"
      - "releases/evidence/sprint-054/CTOA-285.md"
    acceptance:
      - "Validator asserts RELEASED docs require aligned runtime state"
      - "Mismatch gate remains critical with actionable hints"
      - "CI passes only when assertion conditions are satisfied"

  - id: CTOA-286
    title: "Execute Sprint-054 Wave-1 and collect evidence"
    priority: P1
    type: governance
    domain: [governance, qa, release]
    assignees: [strategos, qa-terminator, documentation-sage]
    estimate_hours: 3
    deliverables:
      - "runtime/ci-artifacts/sprint-054-wave1-run.log"
      - "runtime/ci-artifacts/sprint-054-wave1-summary.txt"
      - "releases/evidence/sprint-054/CTOA-286.md"
      - "docs/history/sprints/SPRINT-054-PROGRESS.md"
    acceptance:
      - "Wave-1 chain completes with green gates"
      - "Evidence links are complete"
      - "Residual risk notes are explicit"

  - id: CTOA-287
    title: "Publish Sprint-054 sign-off and Sprint-055 handoff"
    priority: P1
    type: governance
    domain: [governance, release, planning]
    assignees: [strategos, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "docs/history/sprints/SPRINT-054.md"
      - "releases/evidence/sprint-054/CTOA-287.md"
    acceptance:
      - "Sign-off includes delivered scope and unresolved items"
      - "Sprint-055 handoff recommendations are documented"
      - "God Mode checkpoint is explicit"
