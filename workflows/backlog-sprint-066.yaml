version: 1
backlog_id: sprint-066
window_days: 3
focus: "Sprint-066 packaging + release hardening"
owner: strategos

rules:
  max_parallel_tasks: 2
  definition_of_done:
    - implementation_created
    - validation_passed
    - evidence_recorded
    - documentation_updated
  release_policy:
    - approval_required: true
    - environment: production

tasks:
  - id: CTOA-329
    title: "Harden release/update manifest signing and launch gate"
    priority: P0
    type: process
    domain: [release, governance, packaging]
    assignees: [strategos, devops-master, qa-terminator]
    estimate_hours: 3
    deliverables:
      - "product/ctoa-toolkit.manifest.json"
      - "scripts/ops/ctoa_update_gate.py"
      - "docs/history/sprints/SPRINT-066.md"
      - "docs/history/sprints/SPRINT-066-PROGRESS.md"
    acceptance:
      - "Update gate refuses launch when release/update manifest is unsigned or out of sync"
      - "Public launch flow remains blocked until mandatory update gate passes"
      - "Manifest metadata stays aligned with the published toolkit version"

  - id: CTOA-330
    title: "Simplify bootstrap UX for non-technical operators"
    priority: P0
    type: product
    domain: [bootstrap, ux, installation]
    assignees: [core-architect, code-smith]
    estimate_hours: 4
    deliverables:
      - "scripts/ops/ctoa_product_bootstrap.py"
      - "config/ctoa-user-config.template.json"
      - "docs/LOCAL_SETUP.md"
    acceptance:
      - "Bootstrap creates local state with minimal manual steps"
      - "First-launch guidance is clear and reproducible on Windows"
      - "Template config covers the public toolkit launch defaults"

  - id: CTOA-331
    title: "Clean up public/private surface and refresh toolkit docs"
    priority: P1
    type: product
    domain: [docs, hygiene, packaging]
    assignees: [documentation-sage, core-architect]
    estimate_hours: 3
    deliverables:
      - "docs/PRODUCT_PUBLIC_PRIVATE_ARCHITECTURE.md"
      - "docs/PRODUCT_PORTFOLIO.md"
      - "docs/REPO_HYGIENE_POLICY.md"
      - "README.md"
      - "product/packages/"
    acceptance:
      - "Docs clearly distinguish public toolkit paths from private studio overlays"
      - "README and product map no longer reference stale sprint phases as active"
      - "Package manifests remain aligned with Core/Pro/Studio boundaries"