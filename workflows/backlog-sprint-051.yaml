version: 1
backlog_id: sprint-051
window_days: 3
focus: "Runtime state sync hardening + approval closure continuity + Sprint-051 wave execution"
owner: strategos

rules:
  max_parallel_tasks: 3
  definition_of_done:
    - implementation_created
    - validation_passed
    - evidence_recorded
    - documentation_updated
  release_policy:
    - approval_required: true
    - environment: production

tasks:
  - id: CTOA-264
    title: "Open Sprint-051 kickoff baseline and scope lock"
    priority: P0
    type: governance
    domain: [governance, planning, release]
    assignees: [strategos, core-architect, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "workflows/backlog-sprint-051.yaml"
      - "workflows/sprint-051-delivery-flow.yaml"
      - "docs/history/sprints/SPRINT-051.md"
    acceptance:
      - "Sprint-051 backlog and flow are published"
      - "Scope and gate expectations are explicit"
      - "Kickoff decision checkpoint is documented"

  - id: CTOA-265
    title: "Wire Sprint-051 validator and local Wave-1 chain"
    priority: P0
    type: quality
    domain: [ci, qa, automation]
    assignees: [qa-terminator, core-architect]
    estimate_hours: 3
    deliverables:
      - "scripts/ops/sprint051_validate.py"
      - ".vscode/tasks.json"
      - "runtime/ci-artifacts/sprint-051-validation.json"
    acceptance:
      - "Validator checks Sprint-051 files, hooks, pipeline, and task wiring"
      - "Wave-1 chain executes tests plus validate plus launch gate"
      - "Validation artifact path is wired in CI"

  - id: CTOA-266
    title: "Harden runtime task-state synchronization after Wave-1"
    priority: P1
    type: governance
    domain: [governance, ops, observability]
    assignees: [strategos, devops-master]
    estimate_hours: 2
    deliverables:
      - "docs/VALIDATION_CHECKLIST.md"
      - "releases/evidence/sprint-051/CTOA-266.md"
    acceptance:
      - "Post-wave state sync checks are explicit in operations"
      - "State/evidence drift detection path is documented"
      - "Operator closure sequence includes state sync verification"

  - id: CTOA-267
    title: "Enforce tracked evidence continuity for sign-off artifacts"
    priority: P1
    type: governance
    domain: [governance, release, hygiene]
    assignees: [documentation-sage, core-architect]
    estimate_hours: 2
    deliverables:
      - "docs/REPO_HYGIENE_POLICY.md"
      - "releases/evidence/sprint-051/CTOA-267.md"
    acceptance:
      - "Sign-off artifact classes and promotion rules are explicit"
      - "Tracked evidence path is used for release-critical outputs"
      - "Policy examples include Sprint-051 usage"

  - id: CTOA-268
    title: "Execute Sprint-051 Wave-1 and collect evidence"
    priority: P1
    type: governance
    domain: [governance, qa, release]
    assignees: [strategos, qa-terminator, documentation-sage]
    estimate_hours: 3
    deliverables:
      - "runtime/ci-artifacts/sprint-051-wave1-run.log"
      - "releases/evidence/sprint-051/CTOA-268.md"
      - "docs/history/sprints/SPRINT-051-PROGRESS.md"
    acceptance:
      - "Wave-1 chain completes with green gates"
      - "Evidence links are complete"
      - "Residual risk notes are explicit"

  - id: CTOA-269
    title: "Publish Sprint-051 sign-off and Sprint-052 handoff"
    priority: P1
    type: governance
    domain: [governance, release, planning]
    assignees: [strategos, documentation-sage]
    estimate_hours: 2
    deliverables:
      - "docs/history/sprints/SPRINT-051.md"
      - "releases/evidence/sprint-051/CTOA-269.md"
    acceptance:
      - "Sign-off includes delivered scope and unresolved items"
      - "Sprint-052 handoff recommendations are documented"
      - "God Mode checkpoint is explicit"
