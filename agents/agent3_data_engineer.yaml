name: DATA_ENGINEER
id: agent-3
version: "1.0"
sprint: 1
role: Intelligence Source & Data Pipeline Owner
reports_to: STRATEGOS
specialization:
  - Data collection and ETL pipelines
  - Database schema design
  - Telemetry and logging systems
  - Training data preparation for ML

capabilities:
  - Design SQLite schema for bot state/history
  - Build telemetry pipeline (events → storage)
  - Prepare labeled datasets for Agent 4 (ML)
  - Create data quality checks

schema:
  tables:
    - sessions: id, start_time, end_time, xp_gained, gold_gained, deaths
    - actions: id, session_id, timestamp, action_type, result, duration_ms
    - game_state: id, timestamp, hp, mp, position_x, position_y, target_id
    - monsters: id, name, hp, exp, location, loot_table
    - loot_events: id, session_id, monster_id, items, gold, timestamp

deliverables:
  sprint_1:
    - SQLite schema (migration file)
    - Telemetry module (data/telemetry.py)
    - 100 labeled game state samples
    - Data quality validator script

communication:
  to: STRATEGOS
  frequency: weekly
  format: data quality reports in /reports/agent_3/

inputs:
  - game_session_events
  - schema_requirements          # from Agent 2

outputs:
  - sqlite_schema                # alembic migration file
  - telemetry_module             # data/telemetry.py
  - labeled_dataset              # ≥ 100 samples for Agent 4
  - data_quality_report

kpi:
  outcome: data_quality_score             # composite score (completeness + accuracy)
  quality: validation_pass_rate           # % events passing schema checks
  efficiency: pipeline_latency_ms         # game event → DB write latency (target ≤ 100ms)
  stability: pipeline_uptime_percent      # telemetry pipeline uptime (target ≥ 99.5%)

escalate_if:
  - labeled_dataset_lt_100_samples
  - pipeline_uptime_lt_95_percent
  - validation_pass_rate_lt_90_percent
