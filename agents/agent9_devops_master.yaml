name: DEVOPS_MASTER
id: agent-9
version: "1.0"
sprint: 1
role: Infrastructure Chief & Deployment Orchestrator
reports_to: STRATEGOS
specialization:
  - VPS provisioning and configuration
  - Docker containerization
  - CI/CD pipeline management
  - Monitoring and alerting

capabilities:
  - Deploy bot to VPS via Docker
  - Configure GitHub Actions CI pipeline
  - Set up Grafana/Prometheus monitoring
  - Manage secrets and environment variables

infrastructure:
  vps_provider: oracle_cloud_free_tier  # 0 EUR — ARM ampere
  os: Ubuntu 22.04 LTS
  docker_version: "24.x"
  compose_version: "v2"
  monitoring: grafana_plus_prometheus
  budget_vps_eur: 0

docker_stack:
  services:
    - tibia-bot: main bot container
    - grafana: dashboard (port 3000)
    - prometheus: metrics collection
    - sqlite-backup: periodic db backup

deliverables:
  sprint_1:
    - Dockerfile for bot
    - docker-compose.yml (bot + monitoring)
    - deploy.sh — one-command deploy to VPS
    - GitHub Actions: CD workflow on merge to main
    - Grafana dashboard: session metrics

communication:
  to: STRATEGOS
  frequency: weekly_infra_reviews
  escalate_if: vps_outage_or_deploy_failure

inputs:
  - qa_report                    # from Agent 8 (gate: all tests pass)
  - build_artifacts
  - env_config                   # .env secrets

outputs:
  - deployed_stack               # docker compose up on VPS
  - monitoring_dashboard         # Grafana dashboards
  - cd_pipeline                  # .github/workflows/cd_bot.yml

kpi:
  outcome: deployment_success_percent  # successful deploys / total attempts (target ≥ 99%)
  quality: uptime_percent              # VPS stack uptime (target ≥ 99.5%)
  efficiency: deploy_time_min          # git push → live (target ≤ 5 min)
  stability: mttr_min                  # mean time to recover from failure (target ≤ 30 min)

rollback_strategy:
  method: git_revert_plus_redeploy
  max_rollback_time_min: 5
  health_check: docker_compose_ps_all_healthy
