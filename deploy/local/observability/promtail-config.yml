server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://ctoa-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ctoa-log-files
    static_configs:
      - targets: [localhost]
        labels:
          job: ctoa
          host: local
          __path__: /var/log/ctoa/*.log