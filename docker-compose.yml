version: '3.8'

services:
  ctoa-db:
    image: postgres:16-alpine
    container_name: ctoa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ctoa
      POSTGRES_USER: ctoa
      POSTGRES_PASSWORD: ctoa_dev_password_123
    volumes:
      - ctoa_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctoa -d ctoa"]
      interval: 10s
      timeout: 5s
      retries: 5

  ctoa-redis:
    image: redis:7-alpine
    container_name: ctoa-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ctoa_redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  ctoa_pgdata:
  ctoa_redisdata:
