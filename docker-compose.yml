version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ctoa-postgres
    restart: always
    env_file: /opt/ctoa/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-ctoa}
      POSTGRES_USER: ${DB_USER:-ctoa}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ctoa}"]
      interval: 30s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:16-alpine
    container_name: ctoa-backup
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: /opt/ctoa/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME:-ctoa}
      POSTGRES_USER: ${DB_USER:-ctoa}
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./docker/backup:/backups
      - ./docker/backup/crontab:/etc/crontabs/root:ro
    entrypoint: crond -f -l 2

  ollama:
    image: ollama/ollama:latest
    container_name: ctoa-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ctoa-api
    restart: always
    env_file: /opt/ctoa/.env
    environment:
      CTOA_LLM_PROVIDER: local
      CTOA_LOCAL_MODEL_URL: http://ollama:11434/v1
      DB_HOST: postgres
    ports:
      - "0.0.0.0:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  pgdata:
  ollama_data:
