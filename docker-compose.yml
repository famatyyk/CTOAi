version: '3.8'

services:
  ctoa-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ctoa-runner
    ports:
      - "8787:8787"
    volumes:
      - ./config:/opt/ctoa/config
      - ./runtime:/opt/ctoa/runtime
      - ./logs:/opt/ctoa/logs
    environment:
      - CTOA_ENV=dev
      - CTOA_MOBILE_TOKEN=dev-token-12345
      - CTOA_MOBILE_FULL_ACCESS=true
      - LOG_LEVEL=DEBUG
    command: |
      bash -c "
      pip install -q uvicorn &&
      python -m uvicorn mobile_console.app:app --host 0.0.0.0 --port 8787 --reload
      "
    networks:
      - ctoa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  ctoa-dev-shell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ctoa-dev-shell
    volumes:
      - ./:/opt/ctoa
    environment:
      - CTOA_ENV=dev
    command: /bin/bash
    stdin_open: true
    tty: true
    networks:
      - ctoa-network
    profiles:
      - dev

networks:
  ctoa-network:
    driver: bridge
