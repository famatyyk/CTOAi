name: "CTOA VPS Global Save Cycle"

# ============================================================
# Runs once per day at 05:50 UTC (before 06:00 GS on server).
# GitHub Actions monitors the VPS GS reset process and can
# optionally trigger emergency rollback or alert.
#
# The actual shutdown/startup/inject/validate is done
# by the VPS systemd timer (ctoa-gs-reset.timer @ 06:00).
# This workflow:
#   1. Confirms VPS connectivity
#   2. Triggers the gs-reset.sh via SSH  (or waits for systemd timer)
#   3. Polls for completion
#   4. Posts a GS cycle report as a GitHub summary
# ============================================================

on:
  schedule:
    - cron: "50 5 * * *"    # 05:50 UTC daily — fires 10 min before GS
  workflow_dispatch:
    inputs:
      force_reset:
        description: "Force gs-reset.sh immediately (bypass waiting for timer)"
        required: false
        default: "false"
      skip_validation:
        description: "Skip API validation step (for dry-run diagnostics)"
        required: false
        default: "false"

jobs:
  gs-cycle:
    name: "VPS Global Save Cycle"
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      VPS_HOST: ${{ secrets.CTOA_VPS_HOST }}
      VPS_USER: ${{ secrets.CTOA_VPS_USER }}
      SSH_KEY:  ${{ secrets.CTOA_VPS_SSH_KEY }}
      VPS_PORT: ${{ secrets.CTOA_VPS_SSH_PORT }}
      CTOA_DIR: /opt/ctoa

    steps:
      # --------------------------------------------------------
      # 0. Set up SSH key
      # --------------------------------------------------------
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh

          # Accept both plain private-key secrets and base64-encoded key secrets.
          if printf '%s' "$SSH_KEY" | grep -q 'BEGIN .*PRIVATE KEY'; then
            printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/ctoa_vps
          else
            printf '%s' "$SSH_KEY" | tr -d '\r\n' | base64 -d > ~/.ssh/ctoa_vps
          fi

          chmod 600 ~/.ssh/ctoa_vps

          VPS_PORT_EFFECTIVE="${VPS_PORT:-22}"
          if ! [[ "$VPS_PORT_EFFECTIVE" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid VPS SSH port: $VPS_PORT_EFFECTIVE"
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/ctoa_vps >/dev/null 2>&1; then
            echo '::error::CTOA_VPS_SSH_KEY is not a valid private key (plain or base64).'
            exit 1
          fi

          ssh-keyscan -p "$VPS_PORT_EFFECTIVE" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # --------------------------------------------------------
      # 1. Verify VPS connectivity (with retries)
      # --------------------------------------------------------
      - name: Preflight SSH connectivity
        id: preflight
        shell: bash
        run: |
          VPS_PORT_EFFECTIVE="${VPS_PORT:-22}"
          echo "Checking TCP connectivity to $VPS_HOST:$VPS_PORT_EFFECTIVE"
          VPS_REACHABLE=false
          for attempt in 1 2 3; do
            if timeout 10 bash -c "</dev/tcp/$VPS_HOST/$VPS_PORT_EFFECTIVE" 2>/dev/null; then
              VPS_REACHABLE=true
              break
            fi
            echo "Attempt $attempt/3 failed — waiting 10s before retry..."
            sleep 10
          done
          if [ "$VPS_REACHABLE" = "true" ]; then
            echo "vps_reachable=true" >> "$GITHUB_OUTPUT"
            echo "VPS TCP connectivity confirmed."
          else
            echo "vps_reachable=false" >> "$GITHUB_OUTPUT"
            echo "::error::Cannot reach $VPS_HOST:$VPS_PORT_EFFECTIVE from GitHub Actions (connection refused/timeout after 3 attempts)."
            echo "::error::Check sshd status, SSH port, firewall, and cloud security rules."
            # Do not exit 1 here — allow downstream steps to be skipped and the
            # report step to capture the degraded state. The final step enforces failure.
          fi

      - name: Verify VPS connectivity
        if: steps.preflight.outputs.vps_reachable == 'true'
        run: |
          ssh -i ~/.ssh/ctoa_vps -p "${VPS_PORT:-22}" -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "$VPS_USER@$VPS_HOST" "echo VPS_OK"

      # --------------------------------------------------------
      # 2. Pull latest code on VPS  (agents receive new modules)
      # --------------------------------------------------------
      - name: Pull latest code on VPS
        if: steps.preflight.outputs.vps_reachable == 'true'
        run: |
          # Best-effort sync only: GS cycle must not fail solely on VPS repo ownership drift.
          ssh -i ~/.ssh/ctoa_vps -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "git config --global --add safe.directory $CTOA_DIR && cd $CTOA_DIR && (git fetch --quiet && git reset --hard origin/main) >/tmp/ctoa-git-sync.log 2>&1; status=\$?; if [ \$status -ne 0 ]; then echo '::warning::VPS git sync skipped (non-blocking). Check repo ownership/permissions on server.'; tail -3 /tmp/ctoa-git-sync.log || true; else tail -3 /tmp/ctoa-git-sync.log; fi"

      # --------------------------------------------------------
      # 3. Validate shell script syntax on VPS (pre-reset gate)
      # --------------------------------------------------------
      - name: Validate shell script syntax
        if: steps.preflight.outputs.vps_reachable == 'true'
        run: |
          ssh -i ~/.ssh/ctoa_vps -p "${VPS_PORT:-22}" -o BatchMode=yes "$VPS_USER@$VPS_HOST" bash <<'ENDSSH'
          failed=0
          for f in /opt/ctoa/scripts/ops/*.sh; do
            [ -e "$f" ] || continue
            if [ ! -r "$f" ]; then
              echo "WARN: unreadable (skipped): ${f#/opt/ctoa/}"
              continue
            fi
            if bash -n "$f"; then
              echo "OK: ${f#/opt/ctoa/}"
            else
              echo "FAIL: ${f#/opt/ctoa/}"
              failed=1
            fi
          done
          exit $failed
          ENDSSH

      # --------------------------------------------------------
      # 4. Trigger GS Reset (or wait for systemd timer to fire)
      # --------------------------------------------------------
      - name: Trigger GS Reset
        if: steps.preflight.outputs.vps_reachable == 'true'
        run: |
          FORCE="${{ github.event.inputs.force_reset || 'false' }}"
          EVENT_NAME="${{ github.event_name }}"
          NOW_UTC_HHMM="$(date -u +%H%M)"

          RUN_DIRECT="false"
          if [ "$FORCE" = "true" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RUN_DIRECT="true"
          elif [ "$EVENT_NAME" = "schedule" ] && [ $((10#$NOW_UTC_HHMM)) -ge 600 ]; then
            # If the scheduled run starts late (after 06:00 UTC), waiting for the timer can only time out.
            RUN_DIRECT="true"
            echo "Scheduled run started at ${NOW_UTC_HHMM} UTC (after 06:00) - executing gs-reset.sh directly."
          fi

          if [ "$RUN_DIRECT" = "true" ]; then
            echo "Running gs-reset.sh directly ..."
            ssh -i ~/.ssh/ctoa_vps -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
              "bash $CTOA_DIR/scripts/ops/gs-reset.sh 2>&1 | tail -80"
          else
            echo "Waiting for systemd ctoa-gs-reset.timer to fire at 06:00 UTC ..."
            # Poll until the gs-reset log shows CYCLE COMPLETE or timeout.
            ELAPSED=0
            until ssh -i ~/.ssh/ctoa_vps -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
                "grep -q 'GS RESET CYCLE COMPLETE' $CTOA_DIR/logs/gs-reset.log 2>/dev/null" \
              || [ "$ELAPSED" -ge 900 ]; do
              sleep 30
              ELAPSED=$(( ELAPSED + 30 ))
              echo "Waiting ... ${ELAPSED}s elapsed"
            done
            if [ "$ELAPSED" -ge 900 ]; then
              echo "::error::GS reset did not complete within 15 min - check VPS logs"
              exit 1
            fi
          fi

      # --------------------------------------------------------
      # 4. Collect GS reset log tail for summary
      # --------------------------------------------------------
      - name: Collect GS reset log
        if: always()
        run: |
          if [ "${{ steps.preflight.outputs.vps_reachable }}" = "true" ]; then
            ssh -i ~/.ssh/ctoa_vps -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
              "tail -120 $CTOA_DIR/logs/gs-reset.log 2>/dev/null || echo '(no log found)'" \
              > /tmp/gs-reset-tail.log 2>/dev/null || echo "(SSH failed while collecting log)" > /tmp/gs-reset-tail.log
          else
            echo "(VPS unreachable — log not available)" > /tmp/gs-reset-tail.log
          fi
          cat /tmp/gs-reset-tail.log

      # --------------------------------------------------------
      # 5. Verify all CTOA systemd services are up
      # --------------------------------------------------------
      - name: Verify services are active
        if: steps.preflight.outputs.vps_reachable == 'true'
        run: |
          ssh -i ~/.ssh/ctoa_vps -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "systemctl is-active ctoa-health-live.service ctoa-db.service \
             ctoa-runner.timer ctoa-agents-orchestrator.timer" \
          && echo "Core services ACTIVE" \
          || { echo "::error::One or more core services not active after GS reset"; exit 1; }

      # --------------------------------------------------------
      # 6. API validation via commanding agent
      # --------------------------------------------------------
      - name: Run API compliance check
        if: ${{ steps.preflight.outputs.vps_reachable == 'true' && github.event.inputs.skip_validation != 'true' }}
        run: |
          ssh -i ~/.ssh/ctoa_vps -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "cd $CTOA_DIR && source .venv/bin/activate && \
             python3 scripts/ops/gs-api-validator.py 2>&1 | tail -40"

      # --------------------------------------------------------
      # 7. Post GS cycle report to GitHub Actions summary
      # --------------------------------------------------------
      - name: Post GS Cycle Report
        if: always()
        run: |
          VPS_REACHABLE="${{ steps.preflight.outputs.vps_reachable }}"
          STATUS="${{ job.status }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## CTOA Global Save Cycle — $DATE"
            echo ""
            echo "| Phase | Result |"
            echo "|-------|--------|"
            if [ "$VPS_REACHABLE" = "true" ]; then
              echo "| VPS connectivity | ✅ |"
            else
              echo "| VPS connectivity | ❌ unreachable |"
            fi
            echo "| Code pull (git reset --hard) | $( [ "$VPS_REACHABLE" = "true" ] && echo '✅' || echo '⏭ skipped' ) |"
            echo "| Shell syntax validation | $( [ "$STATUS" = "success" ] && echo '✅' || [ "$VPS_REACHABLE" != "true" ] && echo '⏭ skipped' || echo '❌' ) |"
            echo "| GS Reset (shutdown → rest → startup) | $( [ "$STATUS" = "success" ] && echo '✅' || [ "$VPS_REACHABLE" != "true" ] && echo '⏭ skipped' || echo '❌' ) |"
            echo "| Service health check | $( [ "$STATUS" = "success" ] && echo '✅' || [ "$VPS_REACHABLE" != "true" ] && echo '⏭ skipped' || echo '❌' ) |"
            echo "| API compliance validation | $( [ "$STATUS" = "success" ] && echo '✅' || [ "$VPS_REACHABLE" != "true" ] && echo '⏭ skipped' || echo '⚠️ skipped/failed' ) |"
            echo ""
            echo "### GS Reset Log Tail"
            echo '```'
            cat /tmp/gs-reset-tail.log 2>/dev/null || echo "(no log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # --------------------------------------------------------
      # 8. Fail the job if VPS was not reachable (infra alert)
      # --------------------------------------------------------
      - name: Assert VPS reachable
        if: always()
        run: |
          if [ "${{ steps.preflight.outputs.vps_reachable }}" != "true" ]; then
            echo "::error::VPS was not reachable — GS cycle could not run. Check sshd, firewall, and cloud security rules on the VPS."
            exit 1
          fi

      # --------------------------------------------------------
      # 9. Cleanup SSH key
      # --------------------------------------------------------
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ctoa_vps
