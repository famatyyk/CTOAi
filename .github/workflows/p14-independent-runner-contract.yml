name: P14 Independent Runner Contract

on:
  pull_request:
    paths:
      - ".github/workflows/p14-independent-runner-contract.yml"
      - "AI/generated/ROADMAP_STATE.json"
      - "scripts/lua/ctoa_chooser/**"
      - "requirements.txt"
      - "schemas/ctoa-p14-*.schema.json"
      - "schemas/ctoa-p14-runner-*.schema.json"
      - "scripts/lua/otclient/**"
      - "scripts/ops/otclient_p14_acceptance_attestation.py"
      - "scripts/ops/otclient_p14_guest_evidence.py"
      - "scripts/ops/otclient_p14_independent_runner.py"
      - "scripts/ops/otclient_p14_replay_ledger.py"
      - "scripts/ops/otclient_p14_runner_preflight.py"
      - "scripts/ops/otclient_p14_sandbox_executor.py"
      - "scripts/windows/otclient_p14_*.ps1"
      - "tests/test_otclient_p14_acceptance_attestation.py"
      - "tests/test_otclient_p14_guest_evidence.py"
      - "tests/test_otclient_p14_independent_runner.py"
      - "tests/test_otclient_p14_replay_ledger.py"
      - "tests/test_otclient_p14_runner_preflight.py"
      - "tests/test_otclient_p14_sandbox_executor.py"
      - "tests/test_otclient_p14_vm_capture.py"
  workflow_dispatch:
    inputs:
      run_protected_replay:
        description: Run the trusted P14 replay on a protected GitHub-hosted Windows runner
        required: true
        default: false
        type: boolean
      acceptance_envelope_b64:
        description: Optional base64-encoded signed external isolated P14 evidence envelope
        required: false
        default: ''
        type: string
      guest_run_id:
        description: Required 16-hex one-time run id bound to an external evidence envelope
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: p14-independent-runner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  artifact-replay:
    name: GitHub-hosted signed artifact replay
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out clean source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install contract dependencies
        run: python -m pip install pytest "jsonschema>=4.23.0,<5.0.0" "cryptography>=42.0.0,<49.0.0"

      - name: Install pinned Lua runtime for behavioral contract tests
        shell: pwsh
        run: |
          choco install lua --version=5.1.5.52 --yes --no-progress
          $lua = Get-Command lua -ErrorAction Stop
          & $lua.Source -v
          Split-Path -Parent $lua.Source | Add-Content -LiteralPath $env:GITHUB_PATH

      - name: Run schema, tamper, and rollback contract tests
        run: >-
          python -m pytest
          tests/test_otclient_p14_independent_runner.py
          tests/test_otclient_p14_acceptance_attestation.py
          tests/test_otclient_p14_guest_evidence.py
          tests/test_otclient_p14_runner_preflight.py
          tests/test_otclient_p14_replay_ledger.py
          tests/test_otclient_p14_sandbox_executor.py
          tests/test_otclient_p14_vm_capture.py -q
          tests/test_otclient_p14_guest_runner.py
          tests/test_otclient_p14_baseline_capture.py -q

      - name: Create job-scoped signing material
        shell: python
        run: |
          import os
          import secrets

          env_file = os.environ["GITHUB_ENV"]
          with open(env_file, "a", encoding="utf-8") as handle:
              handle.write(f"CTOA_P14_RUNNER_SIGNING_KEY={secrets.token_hex(32)}\n")
              handle.write("CTOA_P14_RUNNER_KEY_ID=github-p14-contract\n")

      - name: Prepare signed request from tracked sources
        run: >-
          python scripts/ops/otclient_p14_independent_runner.py prepare
          --artifact-root runtime/p14_independent_runner

      - name: Verify on the clean independent runner
        run: >-
          python scripts/ops/otclient_p14_independent_runner.py verify
          --artifact-root runtime/p14_independent_runner
          --runner-id github-windows-p14

      - name: Verify signed result handoff
        run: >-
          python scripts/ops/otclient_p14_independent_runner.py verify-result
          --artifact-root runtime/p14_independent_runner

      - name: Prepare capability-driven isolated acceptance request
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py prepare
          --artifact-root runtime/p14_independent_runner

      - name: Verify signed acceptance attestation
        if: ${{ hashFiles('runtime/p14_independent_runner/acceptance-result.json') != '' }}
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py verify-result
          --artifact-root runtime/p14_independent_runner

      - name: Upload non-promotable contract evidence
        uses: actions/upload-artifact@v7
        with:
          name: p14-github-hosted-contract-${{ github.run_id }}
          # Keep the archive compatible with the bounded preflight reader and
          # never publish future runtime inputs merely because they are JSON.
          path: |
            runtime/p14_independent_runner/request.json
            runtime/p14_independent_runner/result.json
            runtime/p14_independent_runner/acceptance-request.json
            runtime/p14_independent_runner/acceptance-result.json
            runtime/p14_independent_runner/acceptance-report.json
          if-no-files-found: error
          retention-days: 7

  protected-artifact-replay:
    name: Protected GitHub-hosted Windows signed artifact replay
    if: github.event_name == 'workflow_dispatch' && inputs.run_protected_replay == true
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write
    concurrency:
      # A closed issue is the durable replay ledger. Serialize every protected
      # reservation in this repository so check-then-create cannot race.
      group: p14-guest-evidence-ledger-${{ github.repository_id }}
      cancel-in-progress: false
    environment:
      name: p14-independent-runner
    timeout-minutes: 15
    env:
      CTOA_P14_RUNNER_SIGNING_KEY: ${{ secrets.CTOA_P14_RUNNER_SIGNING_KEY }}
      CTOA_P14_RUNNER_KEY_ID: ${{ vars.CTOA_P14_RUNNER_KEY_ID }}
      CTOA_P14_GUEST_EVIDENCE_PUBLIC_CERT_B64: ${{ vars.CTOA_P14_GUEST_EVIDENCE_PUBLIC_CERT_B64 }}
      CTOA_P14_GUEST_EVIDENCE_KEY_ID: ${{ vars.CTOA_P14_GUEST_EVIDENCE_KEY_ID }}
      CTOA_P14_GUEST_SNAPSHOT_ID: ${{ vars.CTOA_P14_GUEST_SNAPSHOT_ID }}
      CTOA_P14_GUEST_SNAPSHOT_MANIFEST_SHA256: ${{ vars.CTOA_P14_GUEST_SNAPSHOT_MANIFEST_SHA256 }}
      CTOA_P14_APPLIANCE_BINDING_SHA256: ${{ vars.CTOA_P14_APPLIANCE_BINDING_SHA256 }}
      CTOA_P14_GUEST_SOURCE_REVISION: ${{ vars.CTOA_P14_GUEST_SOURCE_REVISION }}
      CTOA_P14_GUEST_RUN_ID: ${{ inputs.guest_run_id }}

    steps:
      - name: Check out clean source without persisted credentials
        uses: actions/checkout@v7
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install contract dependencies
        run: python -m pip install pytest "jsonschema>=4.23.0,<5.0.0" "cryptography>=42.0.0,<49.0.0"

      - name: Install pinned Lua runtime for behavioral contract tests
        shell: pwsh
        run: |
          choco install lua --version=5.1.5.52 --yes --no-progress
          $lua = Get-Command lua -ErrorAction Stop
          & $lua.Source -v
          Split-Path -Parent $lua.Source | Add-Content -LiteralPath $env:GITHUB_PATH

      - name: Validate protected signing material
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:CTOA_P14_RUNNER_SIGNING_KEY)) {
            throw "Missing protected CTOA_P14_RUNNER_SIGNING_KEY environment secret."
          }
          if ([Text.Encoding]::UTF8.GetByteCount($env:CTOA_P14_RUNNER_SIGNING_KEY) -lt 32) {
            throw "Protected signing key must contain at least 32 UTF-8 bytes."
          }
          if ($env:CTOA_P14_RUNNER_KEY_ID -notmatch '^[a-z0-9][a-z0-9._-]{2,63}$') {
            throw "Protected CTOA_P14_RUNNER_KEY_ID environment variable is invalid."
          }

      - name: Bind provider-scoped evidence runner ID
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "CTOA_P14_RUNNER_ID=p14-github-hosted-windows"

      - name: Run schema, tamper, and rollback contract tests
        run: >-
          python -m pytest
          tests/test_otclient_p14_independent_runner.py
          tests/test_otclient_p14_acceptance_attestation.py
          tests/test_otclient_p14_guest_evidence.py
          tests/test_otclient_p14_runner_preflight.py
          tests/test_otclient_p14_replay_ledger.py
          tests/test_otclient_p14_sandbox_executor.py
          tests/test_otclient_p14_vm_capture.py -q
          tests/test_otclient_p14_guest_runner.py
          tests/test_otclient_p14_baseline_capture.py -q

      - name: Prepare request from the trusted clean checkout
        run: >-
          python scripts/ops/otclient_p14_independent_runner.py prepare
          --artifact-root runtime/p14_independent_runner

      - name: Verify request on the isolated runner
        run: >-
          python scripts/ops/otclient_p14_independent_runner.py verify
          --artifact-root runtime/p14_independent_runner
          --runner-id ${{ env.CTOA_P14_RUNNER_ID }}

      - name: Verify signed result handoff
        run: >-
          python scripts/ops/otclient_p14_independent_runner.py verify-result
          --artifact-root runtime/p14_independent_runner

      - name: Prepare capability-driven isolated acceptance request
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py prepare
          --artifact-root runtime/p14_independent_runner

      - name: Validate protected guest evidence identity
        if: ${{ inputs.acceptance_envelope_b64 != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:CTOA_P14_GUEST_EVIDENCE_PUBLIC_CERT_B64 -notmatch '^[A-Za-z0-9+/=]{128,16384}$') {
            throw "Protected guest evidence certificate variable is missing or invalid."
          }
          if ($env:CTOA_P14_GUEST_EVIDENCE_KEY_ID -notmatch '^[a-z0-9][a-z0-9._-]{2,63}$') {
            throw "Protected guest evidence key id variable is missing or invalid."
          }
          if ($env:CTOA_P14_GUEST_SNAPSHOT_ID -notmatch '^[a-z0-9][a-z0-9._-]{2,63}$') {
            throw "Protected guest snapshot id variable is missing or invalid."
          }
          if ($env:CTOA_P14_GUEST_SNAPSHOT_MANIFEST_SHA256 -notmatch '^[a-f0-9]{64}$') {
            throw "Protected guest snapshot manifest variable is missing or invalid."
          }
          if ($env:CTOA_P14_APPLIANCE_BINDING_SHA256 -notmatch '^[a-f0-9]{64}$') {
            throw "Protected appliance binding variable is missing or invalid."
          }
          if ($env:CTOA_P14_GUEST_SOURCE_REVISION -notmatch '^[a-f0-9]{40}$') {
            throw "Protected guest source revision variable is missing or invalid."
          }
          if ($env:GITHUB_SHA -notmatch '^[a-f0-9]{40}$') {
            throw "GitHub source revision is invalid."
          }
          if ($env:CTOA_P14_GUEST_SOURCE_REVISION -cne $env:GITHUB_SHA) {
            throw "Protected guest source revision must match this GitHub source revision."
          }
          if ($env:CTOA_P14_GUEST_RUN_ID -notmatch '^[a-f0-9]{16}$') {
            throw "A 16-hex guest run id is required with an external evidence envelope."
          }

      - name: Inject external isolated guest evidence envelope
        if: ${{ inputs.acceptance_envelope_b64 != '' }}
        shell: pwsh
        env:
          CTOA_P14_ACCEPTANCE_ENVELOPE_B64: ${{ inputs.acceptance_envelope_b64 }}
        run: |
          $ErrorActionPreference = "Stop"
          $bytes = [Convert]::FromBase64String($env:CTOA_P14_ACCEPTANCE_ENVELOPE_B64)
          if ($bytes.Length -gt 32768) { throw "Acceptance envelope input is too large." }
          [IO.File]::WriteAllBytes("runtime/p14_independent_runner/guest-evidence-envelope.json", $bytes)

      - name: Verify external isolated guest evidence before reservation
        if: ${{ hashFiles('runtime/p14_independent_runner/guest-evidence-envelope.json') != '' }}
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py verify-guest-evidence
          --artifact-root runtime/p14_independent_runner

      - name: Reserve one-time verified guest run
        if: ${{ hashFiles('runtime/p14_independent_runner/guest-evidence-envelope.json') != '' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CTOA_P14_LEDGER_REPOSITORY: ${{ github.repository }}
          CTOA_P14_LEDGER_WORKFLOW_RUN_ID: ${{ github.run_id }}
          CTOA_P14_LEDGER_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          $ErrorActionPreference = "Stop"
          $claimPath = "runtime/p14_independent_runner/guest-run-claim.json"
          python scripts/ops/otclient_p14_replay_ledger.py prepare `
            --repository $env:CTOA_P14_LEDGER_REPOSITORY `
            --run-id $env:CTOA_P14_GUEST_RUN_ID `
            --envelope runtime/p14_independent_runner/guest-evidence-envelope.json `
            --workflow-run-id $env:CTOA_P14_LEDGER_WORKFLOW_RUN_ID `
            --workflow-run-attempt $env:CTOA_P14_LEDGER_WORKFLOW_RUN_ATTEMPT `
            --output $claimPath
          $claim = Get-Content -LiteralPath $claimPath -Raw | ConvertFrom-Json -AsHashtable
          if (
            $claim["schema_version"] -ne "ctoa.p14-guest-run-claim.v1" -or
            $claim["issue_title"] -notmatch '^P14 guest evidence consumed v1: [a-f0-9]{64}$' -or
            $claim["issue_body"] -notmatch '^<!-- ctoa-p14-guest-run-ledger:v1 -->'
          ) {
            throw "P14 guest-run ledger claim is malformed."
          }
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
            throw "P14 guest-run ledger token is unavailable."
          }
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $existing = @()
          for ($page = 1; $page -le 100; $page++) {
            $issuesUri = "$env:GITHUB_API_URL/repos/$env:CTOA_P14_LEDGER_REPOSITORY/issues?state=all&per_page=100&page=$page"
            $issues = @(Invoke-RestMethod -Method Get -Headers $headers -Uri $issuesUri)
            $existing = @($issues | Where-Object { $_.title -eq $claim["issue_title"] })
            if ($existing.Count -ne 0 -or $issues.Count -lt 100) {
              break
            }
          }
          if ($existing.Count -eq 0 -and $issues.Count -eq 100) {
            throw "P14 guest-run ledger lookup exceeded its bounded issue scan."
          }
          if ($existing.Count -ne 0) {
            throw "P14 guest run was already consumed; dispatch a fresh isolated run."
          }
          $body = @{ title = $claim["issue_title"]; body = $claim["issue_body"] } | ConvertTo-Json -Compress
          $created = Invoke-RestMethod `
            -Method Post `
            -Headers $headers `
            -ContentType "application/json" `
            -Uri "$env:GITHUB_API_URL/repos/$env:CTOA_P14_LEDGER_REPOSITORY/issues" `
            -Body $body
          if ($created.title -ne $claim["issue_title"] -or $created.number -lt 1) {
            throw "P14 guest-run ledger reservation response is invalid."
          }
          $closed = Invoke-RestMethod `
            -Method Patch `
            -Headers $headers `
            -ContentType "application/json" `
            -Uri "$env:GITHUB_API_URL/repos/$env:CTOA_P14_LEDGER_REPOSITORY/issues/$($created.number)" `
            -Body '{"state":"closed"}'
          if ($closed.state -ne "closed") {
            throw "P14 guest-run ledger could not be closed."
          }

      - name: Verify guest evidence and sign isolated acceptance result
        if: ${{ hashFiles('runtime/p14_independent_runner/guest-evidence-envelope.json') != '' }}
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py attest
          --artifact-root runtime/p14_independent_runner

      - name: Verify signed acceptance attestation
        if: ${{ hashFiles('runtime/p14_independent_runner/acceptance-result.json') != '' }}
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py verify-result
          --artifact-root runtime/p14_independent_runner

      - name: Upload protected contract evidence
        uses: actions/upload-artifact@v7
        with:
          name: p14-protected-contract-${{ github.run_id }}
          # The external envelope and replay-ledger claim are untrusted or
          # operational inputs, not public contract evidence. Upload only the
          # bounded files accepted by otclient_p14_runner_preflight.py.
          path: |
            runtime/p14_independent_runner/request.json
            runtime/p14_independent_runner/result.json
            runtime/p14_independent_runner/acceptance-request.json
            runtime/p14_independent_runner/acceptance-result.json
            runtime/p14_independent_runner/acceptance-report.json
          if-no-files-found: error
          retention-days: 7
