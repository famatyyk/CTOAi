name: Bot CD — Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "bot/**"
      - "requirements-bot.txt"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Bot to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH (uses existing VPS_SSH_KEY + VPS_HOST secrets)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy bot via existing deploy-to-vps.sh
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
        run: |
          chmod +x deploy-to-vps.sh
          # Build bot image and stream to VPS over SSH
          docker build -f bot/infra/Dockerfile -t tibia-bot:latest .
          docker save tibia-bot:latest | \
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "docker load && \
             mkdir -p /opt/tibia-bot/data && \
             cd /opt/tibia-bot && \
             docker run -d --name tibia-bot --restart unless-stopped \
               -v /opt/tibia-bot/data:/app/data \
               --pull never tibia-bot:latest || \
             docker restart tibia-bot"

      - name: Verify deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "docker ps | grep tibia-bot && echo 'Bot is running!' || echo 'WARNING: bot not running'"
