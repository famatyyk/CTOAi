name: PR Quality Report

on:
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr_quality:
    name: PR Quality Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install -r requirements-dev.txt || true

      - name: Core integrity guard
        shell: bash
        run: |
          if [ -f scripts/ops/core_guard.py ]; then
            python scripts/ops/core_guard.py --check
          else
            echo "No core_guard.py found, skipping."
          fi
      - name: Repo hygiene gate
        shell: bash
        run: |
          python scripts/ops/repo_hygiene_audit.py --fail-on-findings --json-out runtime/repo-hygiene/pr-quality.json

      - name: Markdown link check
        shell: bash
        run: |
          python scripts/ops/link_check_docs.py

      - name: Release artifact contract check
        shell: bash
        run: |
          python scripts/ops/validate_release_artifact_contract.py


      - name: Run tests
        run: |
          python -m pytest tests/ --ignore=tests/e2e -v --tb=short 2>&1 | tee test-results.txt || true

      - name: PR Quality Summary
        shell: bash
        run: |
          echo "## PR Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          if grep -q "FAILED" test-results.txt 2>/dev/null; then
            FAIL_COUNT=$(grep -c "FAILED" test-results.txt 2>/dev/null || echo 0)
            echo "| Tests | ❌ $FAIL_COUNT failures |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Tests | ✅ All passing |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Core Integrity | ✅ Checked |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Generated by STRATEGOS Sprint 1 CI gate_" >> $GITHUB_STEP_SUMMARY

