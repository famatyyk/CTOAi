name: Docker Build, Test, Publish, Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ctoa-toolkit
  DOCKER_NAMESPACE: famatyyk

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for tests
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests inside container
        run: |
          docker run --rm \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            python -m pytest tests/ --ignore=tests/e2e -q

  publish-acr:
    name: Publish image to ACR (CI workaround)
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ACR credentials and target inputs
        shell: bash
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          INPUT_ACR_NAME: ${{ vars.ACR_NAME }}
          INPUT_ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail
          if [ -z "${AZURE_CREDENTIALS}" ]; then
            echo "::error::Missing required secret AZURE_CREDENTIALS."
            exit 1
          fi
          if [ -z "${INPUT_ACR_NAME}" ] && [ -z "${INPUT_ACR_LOGIN_SERVER}" ]; then
            echo "::error::Set repository variable ACR_NAME or ACR_LOGIN_SERVER."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve ACR target
        id: acr
        shell: bash
        env:
          INPUT_ACR_NAME: ${{ vars.ACR_NAME }}
          INPUT_ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_ACR_NAME}" ]; then
            ACR_NAME="${INPUT_ACR_NAME}"
          elif [ -n "${INPUT_ACR_LOGIN_SERVER}" ]; then
            ACR_NAME="${INPUT_ACR_LOGIN_SERVER%%.*}"
          else
            echo "ACR target missing: set vars.ACR_NAME or vars.ACR_LOGIN_SERVER." >&2
            exit 1
          fi

          if [ -n "${INPUT_ACR_LOGIN_SERVER}" ]; then
            ACR_LOGIN_SERVER="${INPUT_ACR_LOGIN_SERVER}"
          else
            ACR_LOGIN_SERVER="$(az acr show --name "${ACR_NAME}" --query loginServer -o tsv)"
          fi

          echo "name=${ACR_NAME}" >> "$GITHUB_OUTPUT"
          echo "login_server=${ACR_LOGIN_SERVER}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ steps.acr.outputs.name }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        shell: bash
        env:
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKER_HUB_TOKEN}" ]; then
            echo "::error::Missing required secret DOCKER_HUB_TOKEN."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_NAMESPACE }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker.io/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate VPS deploy secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST}" ]; then
            echo "::error::Missing required secret VPS_HOST."
            exit 1
          fi
          if [ -z "${VPS_USER}" ]; then
            echo "::error::Missing required secret VPS_USER."
            exit 1
          fi
          if [ -z "${VPS_SSH_KEY}" ]; then
            echo "::error::Missing required secret VPS_SSH_KEY."
            exit 1
          fi

      - name: Write SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf "%s" "$VPS_SSH_KEY" > "$HOME/.ssh/ctoa_vps_ed25519"
          chmod 600 "$HOME/.ssh/ctoa_vps_ed25519"

      - name: Deploy tagged release to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          chmod +x ./deploy-to-vps.sh
          ./deploy-to-vps.sh \
            "$VPS_HOST" \
            "$VPS_USER" \
            "$HOME/.ssh/ctoa_vps_ed25519" \
            "${{ github.ref_name }}" \
            "docker.io/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}"
