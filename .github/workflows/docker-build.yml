name: Docker Build, Test, Publish, Deploy

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ctoa-toolkit
  CONTAINER_REGISTRY: ghcr.io
  CONTAINER_NAMESPACE: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for tests
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests inside container
        run: |
          docker run --rm \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            python -m pytest tests/ --ignore=tests/e2e -q

  publish:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    # VPS deployment is opt-in until the deploy script and VPS registry pull
    # credentials are explicitly configured. Publishing to GHCR stays green.
    if: startsWith(github.ref, 'refs/tags/v') && vars.CTOA_ENABLE_VPS_DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate VPS deploy secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST}" ]; then
            echo "::error::Missing required secret VPS_HOST."
            exit 1
          fi
          if [ -z "${VPS_USER}" ]; then
            echo "::error::Missing required secret VPS_USER."
            exit 1
          fi
          if [ -z "${VPS_SSH_KEY}" ]; then
            echo "::error::Missing required secret VPS_SSH_KEY."
            exit 1
          fi

      - name: Write SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf "%s" "$VPS_SSH_KEY" > "$HOME/.ssh/ctoa_vps_ed25519"
          chmod 600 "$HOME/.ssh/ctoa_vps_ed25519"

      - name: Deploy tagged release to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          chmod +x ./deploy-to-vps.sh
          ./deploy-to-vps.sh \
            "$VPS_HOST" \
            "$VPS_USER" \
            "$HOME/.ssh/ctoa_vps_ed25519" \
            "${{ github.ref_name }}" \
            "${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_NAMESPACE }}/${{ env.IMAGE_NAME }}"
