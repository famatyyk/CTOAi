name: Docker Build, Test, Publish, Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ctoa-toolkit
  DOCKER_NAMESPACE: famatyyk

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for tests
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Run tests inside container
        run: |
          docker run --rm \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            python -m pytest tests/ --ignore=tests/e2e -q

  publish:
    needs: build-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.gate.outputs.published }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate publish
        id: gate
        env:
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          if [[ -n "$DOCKER_HUB_TOKEN" ]]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.gate.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_NAMESPACE }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push release image
        if: steps.gate.outputs.published == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker.io/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

  deploy:
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate deploy
        id: gate
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "$VPS_HOST" && -n "$VPS_USER" && -n "$VPS_SSH_KEY" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write SSH key
        if: steps.gate.outputs.deploy == 'true'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf "%s" "$VPS_SSH_KEY" > "$HOME/.ssh/ctoa_vps_ed25519"
          chmod 600 "$HOME/.ssh/ctoa_vps_ed25519"

      - name: Deploy tagged release to VPS
        if: steps.gate.outputs.deploy == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          chmod +x ./deploy-to-vps.sh
          ./deploy-to-vps.sh \
            "$VPS_HOST" \
            "$VPS_USER" \
            "$HOME/.ssh/ctoa_vps_ed25519" \
            "${{ github.ref_name }}" \
            "docker.io/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}"
