name: CTOA Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ctoa-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test_gate:
    name: Build Test Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Core integrity guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

            if ! git show "origin/${{ github.base_ref }}:core/protected-files.txt" > /tmp/protected-files-base.txt; then
              echo "Unable to read core/protected-files.txt from base branch"
              exit 1
            fi

            if ! CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD"); then
              echo "Failed to compute PR diff for core integrity guard"
              exit 1
            fi

            NEED_CHECK=0
            while IFS= read -r line; do
              line="${line%%#*}"
              line="$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              if [ -z "$line" ]; then
                continue
              fi
              if echo "$CHANGED" | grep -Fxq "$line"; then
                NEED_CHECK=1
                break
              fi
            done < /tmp/protected-files-base.txt

            if [ "$NEED_CHECK" -eq 0 ]; then
              echo "No protected files changed in this PR; skipping core integrity guard."
              exit 0
            fi
          fi

          python scripts/ops/core_guard.py --check

      - name: Runtime path freeze guard
        shell: bash
        run: |
          python scripts/ops/runtime_path_guard.py

      - name: Denylist legacy runtime files
        shell: bash
        run: |
          denylist=(
            "runner/agents.py"
          )

          for f in "${denylist[@]}"; do
            if git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "Denied file is tracked again: $f"
              exit 1
            fi
          done

      - name: Shell script syntax check
        shell: bash
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if bash -n "$f" 2>&1; then
              echo "OK: $f"
            else
              echo "::error file=$f::Shell syntax error in $f"
              failed=1
            fi
          done < <(find scripts/ops -name '*.sh' -print0)
          exit $failed

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          pip install yamllint pytest pytest-cov pylint flake8 pyyaml

      - name: Response guardrail regression check
        shell: bash
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          python -m pytest tests/test_response_guardrails.py -q 2>&1 | tee response-guardrails.txt
          RESPONSE_GUARDRAILS_EXIT=${PIPESTATUS[0]}
          set -e
          echo "RESPONSE_GUARDRAILS_EXIT=${RESPONSE_GUARDRAILS_EXIT}" >> "$GITHUB_ENV"

      - name: Publish response guardrail summary
        if: always()
        shell: bash
        run: |
          status="PASS"
          if [ "${RESPONSE_GUARDRAILS_EXIT:-1}" != "0" ]; then
            status="FAIL"
          fi

          {
            echo "## Response Guardrails"
            echo "- Status: ${status}"
            echo "- Exit code: ${RESPONSE_GUARDRAILS_EXIT:-1}"
            echo "- Artifact log: response-guardrails.txt"
            echo ""
            echo "### Tail"
            echo '```'
            if [ -f response-guardrails.txt ]; then
              tail -n 40 response-guardrails.txt
            else
              echo "response-guardrails.txt missing"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Python tests
        shell: bash
        run: |
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --cov=runner --cov=agents --cov-report=xml --cov-report=term-missing 2>&1 | tee test-results.txt
            echo "Tests completed with exit code: $?"
          else
            echo "No tests directory found, skipping test execution"
          fi

      - name: Python linting (flake8)
        shell: bash
        continue-on-error: true
        run: |
          flake8 runner/ agents/ --max-line-length=120 --count --statistics || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.txt
            response-guardrails.txt
          if-no-files-found: ignore

      - name: Enforce response guardrail gate
        shell: bash
        run: |
          if [ "${RESPONSE_GUARDRAILS_EXIT:-1}" != "0" ]; then
            echo "Response guardrail regression check failed"
            exit 1
          fi

      - name: Validate required files
        shell: bash
        run: |
          required=(
            "README.md"
            "agents/ctoa-agents.yaml"
            "prompts/braver-library.yaml"
            "scoring/tool-advisor-rules.yaml"
            "policies/ci-gate-policy.yaml"
            "training/curriculum.md"
            "workflows/daily-loop.md"
            "docs/operating-model.md"
          )

          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done

      - name: Lint YAML
        shell: bash
        run: |
          YAMLLINT_CFG='{extends: default, rules: {line-length: {max: 180}}}'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

            if ! git diff --diff-filter=ACMRT --name-only -z "origin/${{ github.base_ref }}...HEAD" > /tmp/changed-files.zlist; then
              echo "Failed to compute PR diff for YAML lint"
              exit 1
            fi
          else
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              if ! git diff --diff-filter=ACMRT --name-only -z "${{ github.event.before }}...${{ github.sha }}" > /tmp/changed-files.zlist; then
                echo "Failed to compute push diff for YAML lint"
                exit 1
              fi
            else
              git ls-files -z '*.yml' '*.yaml' > /tmp/changed-files.zlist
            fi
          fi

          mapfile -d '' CHANGED_YAML < <(grep -zE '\\.(yml|yaml)$' /tmp/changed-files.zlist || true)
          if [ "${#CHANGED_YAML[@]}" -eq 0 ]; then
            echo "No changed YAML files; skipping YAML lint."
            exit 0
          fi

          echo "Linting changed YAML files:"
          printf '%s\n' "${CHANGED_YAML[@]}"
          yamllint -d "$YAMLLINT_CFG" "${CHANGED_YAML[@]}"

      - name: Lint Markdown basics
        shell: bash
        run: |
          docs=(
            "README.md"
            "training/curriculum.md"
            "workflows/daily-loop.md"
            "docs/operating-model.md"
          )

          for file in "${docs[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing markdown doc: $file"
              exit 1
            fi

            if ! grep -q "^# " "$file"; then
              echo "Markdown file missing top-level heading: $file"
              exit 1
            fi
          done

      - name: Basic secret scan
        shell: bash
        run: |
          pattern='(AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]+|-----BEGIN (RSA|DSA|EC|OPENSSH|PGP|PRIVATE KEY)-----)'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

            if ! git diff --name-only -z "origin/${{ github.base_ref }}...HEAD" > /tmp/changed-files.zlist; then
              echo "Failed to compute PR diff for secret scan"
              exit 1
            fi

            CHANGED_FILES=()
            while IFS= read -r -d '' file; do
              CHANGED_FILES+=("$file")
            done < /tmp/changed-files.zlist

            if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
              echo "No changed files in this PR; skipping secret scan."
              exit 0
            fi

            if grep -nIE "$pattern" -- "${CHANGED_FILES[@]}"; then
              echo "Potential secrets detected in changed PR files"
              exit 1
            fi
          else
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              if ! git diff --diff-filter=ACMRT --name-only -z "${{ github.event.before }}...${{ github.sha }}" > /tmp/changed-files.zlist; then
                echo "Failed to compute push diff for secret scan"
                exit 1
              fi
            else
              git ls-files -z > /tmp/changed-files.zlist
            fi

            CHANGED_FILES=()
            while IFS= read -r -d '' file; do
              CHANGED_FILES+=("$file")
            done < /tmp/changed-files.zlist

            if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
              echo "No changed files on push; skipping secret scan."
              exit 0
            fi

            if grep -nIE "$pattern" -- "${CHANGED_FILES[@]}"; then
              echo "Potential secrets detected in changed push files"
              exit 1
            fi
          fi

      - name: Build package artifact
        shell: bash
        run: |
          tar -czf ctoa-pack.tar.gz \
            README.md \
            agents \
            prompts \
            scoring \
            policies \
            training \
            workflows \
            docs \
            .github/workflows/ctoa-pipeline.yml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctoa-pack
          path: ctoa-pack.tar.gz
          if-no-files-found: error

  approval_publish:
    name: Approval Publish
    needs: build_test_gate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ctoa-pack
          path: dist

      - name: Verify artifact and approval context
        shell: bash
        run: |
          test -f dist/ctoa-pack.tar.gz
          echo "Artifact present and environment approval granted."

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## CTOA Publish Gate"
            echo "- Branch: $GITHUB_REF"
            echo "- Commit: $GITHUB_SHA"
            echo "- Status: APPROVED"
            echo "- Artifact: dist/ctoa-pack.tar.gz"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Marker
        run: echo "Owner approved. Artifact is ready for public use from main."
