name: site-pages-disabled-private-first

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publication-disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Explain private-first publication policy
        run: |
          echo "GitHub Pages publication is disabled by the CTOAi private-first policy."
          echo "Publish only a separately reviewed, sanitized export without repository history."
