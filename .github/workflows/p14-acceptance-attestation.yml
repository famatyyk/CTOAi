name: P14 Isolated Acceptance Attestation

on:
  workflow_dispatch:
    inputs:
      acceptance_report_b64:
        description: Base64-encoded external isolated P14 acceptance report
        required: true
        type: string

permissions:
  contents: read

jobs:
  attest:
    name: Sign and verify isolated acceptance
    runs-on: windows-latest
    environment:
      name: p14-independent-runner
    timeout-minutes: 15
    env:
      CTOA_P14_RUNNER_SIGNING_KEY: ${{ secrets.CTOA_P14_RUNNER_SIGNING_KEY }}
      CTOA_P14_RUNNER_KEY_ID: ${{ vars.CTOA_P14_RUNNER_KEY_ID }}

    steps:
      - name: Check out clean source
        uses: actions/checkout@v7
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install contract dependencies
        run: python -m pip install pytest "jsonschema>=4.23.0,<5.0.0"

      - name: Validate protected signing material
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:CTOA_P14_RUNNER_SIGNING_KEY)) { throw "Missing protected signing key." }
          if ([Text.Encoding]::UTF8.GetByteCount($env:CTOA_P14_RUNNER_SIGNING_KEY) -lt 32) { throw "Protected signing key is too short." }
          if ($env:CTOA_P14_RUNNER_KEY_ID -notmatch '^[a-z0-9][a-z0-9._-]{2,63}$') { throw "Protected key ID is invalid." }

      - name: Run P14 contract tests
        run: >-
          python -m pytest
          tests/test_otclient_p14_independent_runner.py
          tests/test_otclient_p14_acceptance_attestation.py -q

      - name: Prepare and verify signed runner handoff
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/ops/otclient_p14_independent_runner.py prepare --artifact-root runtime/p14_independent_runner
          python scripts/ops/otclient_p14_independent_runner.py verify --artifact-root runtime/p14_independent_runner --runner-id p14-acceptance-attestation
          python scripts/ops/otclient_p14_independent_runner.py verify-result --artifact-root runtime/p14_independent_runner

      - name: Prepare signed acceptance request
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py prepare
          --artifact-root runtime/p14_independent_runner

      - name: Inject external isolated acceptance report
        shell: pwsh
        env:
          CTOA_P14_ACCEPTANCE_REPORT_B64: ${{ inputs.acceptance_report_b64 }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:CTOA_P14_ACCEPTANCE_REPORT_B64)) { throw "Acceptance report input is missing." }
          $bytes = [Convert]::FromBase64String($env:CTOA_P14_ACCEPTANCE_REPORT_B64)
          if ($bytes.Length -gt 32768) { throw "Acceptance report input is too large." }
          [IO.File]::WriteAllBytes("runtime/p14_independent_runner/acceptance-report.json", $bytes)

      - name: Sign isolated acceptance result
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py attest
          --artifact-root runtime/p14_independent_runner

      - name: Verify signed acceptance result
        run: >-
          python scripts/ops/otclient_p14_acceptance_attestation.py verify-result
          --artifact-root runtime/p14_independent_runner

      - name: Upload signed acceptance evidence
        uses: actions/upload-artifact@v7
        with:
          name: p14-acceptance-attestation-${{ github.run_id }}
          path: |
            runtime/p14_independent_runner/acceptance-request.json
            runtime/p14_independent_runner/acceptance-report.json
            runtime/p14_independent_runner/acceptance-result.json
          if-no-files-found: error
          retention-days: 7
