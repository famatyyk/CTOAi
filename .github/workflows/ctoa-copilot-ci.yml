name: CTOA Copilot CI-like

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr_quality_report:
    name: PR Quality Report
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare base ref for diff
        shell: bash
        run: |
          if ! git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"; then
            echo "Failed to fetch base ref: ${{ github.base_ref }}"
            exit 1
          fi

      - name: Install tools
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 pylint

      - name: Run tests
        shell: bash
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          if [ -d "tests" ]; then
            python -m pytest tests/ -q --maxfail=20 2>&1 | tee pr-tests.txt
            PYTEST_EXIT=${PIPESTATUS[0]}
          else
            echo "No tests directory found" | tee pr-tests.txt
            PYTEST_EXIT=0
          fi
          set -e
          echo "PYTEST_EXIT=${PYTEST_EXIT}" >> "$GITHUB_ENV"

      - name: Run response guardrail regression check
        shell: bash
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          python -m pytest tests/test_response_guardrails.py -q 2>&1 | tee pr-response-guardrails.txt
          RESPONSE_GUARDRAILS_EXIT=${PIPESTATUS[0]}
          set -e
          echo "RESPONSE_GUARDRAILS_EXIT=${RESPONSE_GUARDRAILS_EXIT}" >> "$GITHUB_ENV"

      - name: Publish response guardrail summary
        if: always()
        shell: bash
        run: |
          status="PASS"
          if [ "${RESPONSE_GUARDRAILS_EXIT:-1}" != "0" ]; then
            status="FAIL"
          fi

          {
            echo "## Response Guardrails"
            echo "- Status: ${status}"
            echo "- Exit code: ${RESPONSE_GUARDRAILS_EXIT:-1}"
            echo "- Artifact log: pr-response-guardrails.txt"
            echo ""
            echo "### Tail"
            echo '```'
            if [ -f pr-response-guardrails.txt ]; then
              tail -n 40 pr-response-guardrails.txt
            else
              echo "pr-response-guardrails.txt missing"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run flake8
        shell: bash
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          if ! CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD"); then
            echo "Failed to compute PR diff for flake8"
            exit 1
          fi

          CHANGED_PY=()
          while IFS= read -r file; do
            case "$file" in
              runner/*.py|agents/*.py)
                CHANGED_PY+=("$file")
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "${#CHANGED_PY[@]}" -eq 0 ]; then
            echo "No changed Python files in runner/ or agents/" | tee pr-flake8.txt
            FLAKE8_EXIT=0
          else
            flake8 "${CHANGED_PY[@]}" --max-line-length=120 --count --statistics 2>&1 | tee pr-flake8.txt
            FLAKE8_EXIT=${PIPESTATUS[0]}
          fi
          set -e
          echo "FLAKE8_EXIT=${FLAKE8_EXIT}" >> "$GITHUB_ENV"

      - name: Run pylint
        shell: bash
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          if ! CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD"); then
            echo "Failed to compute PR diff for pylint"
            exit 1
          fi

          CHANGED_PY=()
          while IFS= read -r file; do
            case "$file" in
              runner/*.py|agents/*.py)
                CHANGED_PY+=("$file")
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ "${#CHANGED_PY[@]}" -eq 0 ]; then
            echo "No changed Python files in runner/ or agents/" | tee pr-pylint.txt
            PYLINT_EXIT=0
          else
            PYTHONPATH=. pylint "${CHANGED_PY[@]}" \
              -j 0 \
              --score=y \
              --disable=C,R,W,E0401,E0611 \
              2>&1 | tee pr-pylint.txt
            PYLINT_EXIT=${PIPESTATUS[0]}
          fi
          set -e
          echo "PYLINT_EXIT=${PYLINT_EXIT}" >> "$GITHUB_ENV"

      - name: Build PR summary markdown
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          
          def tail_text(path: str, limit: int = 80) -> str:
              p = Path(path)
              if not p.exists():
                  return "(missing)"
              lines = p.read_text(encoding="utf-8", errors="ignore").splitlines()
              lines = lines[-limit:]
              return "\n".join(lines)
          
          pytest_exit = os.environ.get("PYTEST_EXIT", "1")
          response_guardrails_exit = os.environ.get("RESPONSE_GUARDRAILS_EXIT", "1")
          flake8_exit = os.environ.get("FLAKE8_EXIT", "1")
          pylint_exit = os.environ.get("PYLINT_EXIT", "1")
          
          def status(code: str) -> str:
              return "PASS" if code == "0" else "FAIL"
          
          report = []
          report.append("## CTOA Copilot CI-like Report")
          report.append("")
          report.append("| Check | Status | Exit code |")
          report.append("|---|---|---:|")
          report.append(f"| Pytest | {status(pytest_exit)} | {pytest_exit} |")
          report.append(f"| Response Guardrails | {status(response_guardrails_exit)} | {response_guardrails_exit} |")
          report.append(f"| Flake8 | {status(flake8_exit)} | {flake8_exit} |")
          report.append(f"| Pylint | {status(pylint_exit)} | {pylint_exit} |")
          report.append("")
          report.append("### Pytest tail")
          report.append("```")
          report.append(tail_text("pr-tests.txt"))
          report.append("```")
          report.append("")
          report.append("### Response guardrails tail")
          report.append("```")
          report.append(tail_text("pr-response-guardrails.txt"))
          report.append("```")
          report.append("")
          report.append("### Flake8 tail")
          report.append("```")
          report.append(tail_text("pr-flake8.txt"))
          report.append("```")
          report.append("")
          report.append("### Pylint tail")
          report.append("```")
          report.append(tail_text("pr-pylint.txt"))
          report.append("```")
          
          Path("pr-quality-report.md").write_text("\n".join(report) + "\n", encoding="utf-8")
          PY

      - name: Publish step summary
        shell: bash
        run: |
          cat pr-quality-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PR quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-quality-report
          path: |
            pr-quality-report.md
            pr-tests.txt
            pr-response-guardrails.txt
            pr-flake8.txt
            pr-pylint.txt
          if-no-files-found: warn

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-quality-report.md', 'utf8');
            const marker = '<!-- ctoa-copilot-ci-report -->';
            const finalBody = `${marker}\n${body}`;
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: finalBody,
              });
            }

      - name: Enforce PR quality gate
        shell: bash
        run: |
          if [ "$PYTEST_EXIT" != "0" ] || [ "$RESPONSE_GUARDRAILS_EXIT" != "0" ] || [ "$FLAKE8_EXIT" != "0" ] || [ "$PYLINT_EXIT" != "0" ]; then
            echo "Quality gate failed"
            exit 1
          fi
