name: CTOA Close On Gate

on:
  workflow_run:
    workflows: ["CTOA Pipeline"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  close-approved-tasks:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r runner/requirements.txt

      - name: Close tasks that passed gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CTOA_LIVE_ISSUE_NUMBER: "1"
        run: python runner/close_on_gate.py
