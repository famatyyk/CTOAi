name: CTOA Status Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: read
  issues: write

jobs:
  status-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r runner/requirements.txt

      - name: Ensure runtime state exists
        run: |
          mkdir -p runtime
          if [ ! -f runtime/task-state.yaml ]; then
            python runner/runner.py tick
          fi

      - name: Sync status labels and SLA alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CTOA_LIVE_ISSUE_NUMBER: "1"
          CTOA_APPROVAL_SLA_HOURS: "12"
        run: python runner/status_sync.py
