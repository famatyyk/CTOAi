name: "VPS — Deploy CTOAi Stack"

# Manual trigger only — use this to sync docker-compose changes and restart stack.
# Required GitHub Secrets:
#   CTOA_VPS_HOST       — VPS IP or hostname
#   CTOA_VPS_USER       — SSH user (usually: ctoa)
#   CTOA_VPS_SSH_KEY    — SSH private key (raw, not base64)
# Optional GitHub Secrets:
#   CTOA_VPS_ENV_B64    — base64-encoded .env file content (for secret rotation)

on:
  workflow_dispatch:
    inputs:
      update_env:
        description: "Overwrite .env on VPS from CTOA_VPS_ENV_B64 secret"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      pull_images:
        description: "Pull latest Docker images before up"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

jobs:
  deploy:
    name: "Sync & Restart CTOAi Stack"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VPS_HOST: ${{ secrets.CTOA_VPS_HOST }}
      VPS_USER: ${{ secrets.CTOA_VPS_USER }}
      SSH_KEY:  ${{ secrets.CTOA_VPS_SSH_KEY }}
      CTOA_DIR: /opt/ctoa

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ctoa_vps
          chmod 600 ~/.ssh/ctoa_vps
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify VPS connectivity
        run: |
          ssh -i ~/.ssh/ctoa_vps -o BatchMode=yes \
              -o ConnectTimeout=10 \
              "$VPS_USER@$VPS_HOST" "echo VPS_OK"

      - name: Pull latest code on VPS
        run: |
          ssh -i ~/.ssh/ctoa_vps "$VPS_USER@$VPS_HOST" \
            "cd $CTOA_DIR && git fetch --quiet origin && git reset --hard origin/main 2>&1 | tail -5"

      - name: Update .env on VPS (if requested)
        if: ${{ inputs.update_env == 'true' }}
        env:
          VPS_ENV_B64: ${{ secrets.CTOA_VPS_ENV_B64 }}
        run: |
          if [ -z "$VPS_ENV_B64" ]; then
            echo "⚠️  CTOA_VPS_ENV_B64 secret not set — skipping .env update"
            exit 0
          fi
          echo "$VPS_ENV_B64" | base64 -d | \
            ssh -i ~/.ssh/ctoa_vps "$VPS_USER@$VPS_HOST" \
              "cat > $CTOA_DIR/.env && chmod 600 $CTOA_DIR/.env"
          echo "✅ .env deployed to VPS"

      - name: Verify .env exists on VPS
        run: |
          ssh -i ~/.ssh/ctoa_vps "$VPS_USER@$VPS_HOST" bash <<'ENDSSH'
          if [ ! -f /opt/ctoa/.env ]; then
            echo "❌ /opt/ctoa/.env not found — create it manually or set CTOA_VPS_ENV_B64 secret"
            echo "   Run: cp /opt/ctoa/.env.example /opt/ctoa/.env && nano /opt/ctoa/.env"
            exit 1
          fi
          echo "✅ .env exists on VPS"
          # Verify required keys
          for var in DB_PASSWORD REDIS_PASSWORD GF_ADMIN_PASSWORD; do
            if grep -q "^${var}=" /opt/ctoa/.env; then
              echo "  ✅ ${var} set"
            else
              echo "  ⚠️  ${var} missing from .env"
            fi
          done
          ENDSSH

      - name: Pull Docker images (optional)
        if: ${{ inputs.pull_images == 'true' }}
        run: |
          ssh -i ~/.ssh/ctoa_vps "$VPS_USER@$VPS_HOST" bash <<'ENDSSH'
          cd /opt/ctoa
          docker compose pull postgres redis grafana prometheus loki 2>&1 | tail -10 || true
          ENDSSH

      - name: Restart CTOAi stack
        run: |
          ssh -i ~/.ssh/ctoa_vps "$VPS_USER@$VPS_HOST" bash <<'ENDSSH'
          set -e
          cd /opt/ctoa
          echo "=== Stopping old stack ==="
          docker compose down --remove-orphans 2>&1 | tail -5 || true
          echo "=== Starting new stack ==="
          docker compose up -d 2>&1 | tail -20
          echo "=== Waiting for healthchecks ==="
          sleep 15
          docker compose ps 2>&1
          ENDSSH

      - name: Verify stack health
        run: |
          ssh -i ~/.ssh/ctoa_vps "$VPS_USER@$VPS_HOST" bash <<'ENDSSH'
          cd /opt/ctoa
          UNHEALTHY=$(docker compose ps --format json 2>/dev/null | \
            python3 -c "
          import json,sys
          data=sys.stdin.read()
          # handle array or newline-delimited JSON
          try:
              items = json.loads(data)
          except:
              items = [json.loads(l) for l in data.strip().split('\n') if l]
          bad = [s.get('Name','?') for s in items if s.get('Health','') in ('unhealthy','starting') or s.get('State','') not in ('running','')]
          print('\n'.join(bad))
          " 2>/dev/null || echo "")
          if [ -n "$UNHEALTHY" ]; then
            echo "⚠️  Unhealthy/not-running services: $UNHEALTHY"
          else
            echo "✅ All services running"
          fi
          ENDSSH

      - name: Summary
        run: |
          echo "## VPS Stack Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Code: \`git reset --hard origin/main\`" >> $GITHUB_STEP_SUMMARY
          echo "- Stack: \`docker compose up -d\`" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
