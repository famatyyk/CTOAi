name: CTOA Daily CI Health

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  actions: read
  contents: read

jobs:
  daily_ci_health:
    name: Daily CI Health Report
    runs-on: ubuntu-latest

    steps:
      - name: Generate CI health report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowIds = ["ctoa-pipeline.yml", "ctoa-copilot-ci.yml", "ctoa-smoke-must-pass.yml"];
            const nowMs = Date.now();
            const windowMs = 24 * 60 * 60 * 1000;

            const report = [];
            const summary = [];
            const payload = {
              generatedAt: new Date().toISOString(),
              windowHours: 24,
              workflows: [],
            };

            report.push("# CTOA Daily CI Health");
            report.push("");
            report.push(`Generated: ${payload.generatedAt}`);
            report.push("Window: last 24h");
            report.push("");
            report.push("| Workflow | Total | Success | Failure | In Progress | Cancelled | Success % |");
            report.push("|---|---:|---:|---:|---:|---:|---:|");

            const failedJobCounter = new Map();

            for (const workflowId of workflowIds) {
              const runsResp = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                per_page: 30,
              });

              const runs = runsResp.data.workflow_runs.filter((run) => {
                const createdMs = new Date(run.created_at).getTime();
                return nowMs - createdMs <= windowMs;
              });

              let success = 0;
              let failure = 0;
              let inProgress = 0;
              let cancelled = 0;

              for (const run of runs) {
                if (run.status !== "completed") {
                  inProgress += 1;
                } else if (run.conclusion === "success") {
                  success += 1;
                } else if (run.conclusion === "cancelled") {
                  cancelled += 1;
                } else {
                  failure += 1;
                }

                if (run.status === "completed" && run.conclusion && run.conclusion !== "success" && run.conclusion !== "cancelled") {
                  const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id,
                    per_page: 50,
                  });
                  for (const job of jobsResp.data.jobs) {
                    if (job.conclusion === "failure") {
                      failedJobCounter.set(job.name, (failedJobCounter.get(job.name) || 0) + 1);
                    }
                  }
                }
              }

              const total = runs.length;
              const successRate = total > 0 ? ((success / total) * 100).toFixed(1) : "0.0";
              report.push(`| ${workflowId} | ${total} | ${success} | ${failure} | ${inProgress} | ${cancelled} | ${successRate}% |`);

              payload.workflows.push({
                workflowId,
                total,
                success,
                failure,
                inProgress,
                cancelled,
                successRate: Number(successRate),
              });
            }

            report.push("");
            report.push("## Top Failing Jobs (24h)");
            const top = Array.from(failedJobCounter.entries())
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5);

            if (top.length === 0) {
              report.push("- No failing jobs in the last 24h.");
            } else {
              for (const [jobName, count] of top) {
                report.push(`- ${jobName}: ${count}`);
              }
            }

            fs.mkdirSync("runtime/ci-artifacts", { recursive: true });
            fs.writeFileSync("runtime/ci-artifacts/daily-ci-health.md", report.join("\n"), "utf8");
            fs.writeFileSync("runtime/ci-artifacts/daily-ci-health.json", JSON.stringify(payload, null, 2), "utf8");

            core.summary.addHeading("CTOA Daily CI Health");
            core.summary.addRaw(report.join("\n"));
            await core.summary.write();

      - name: Upload daily CI health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ci-health-report
          path: |
            runtime/ci-artifacts/daily-ci-health.md
            runtime/ci-artifacts/daily-ci-health.json
          if-no-files-found: error
